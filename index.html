<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic Radio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Majestic Radio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2d1f4e">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    <style>
        :root {
            --bg-primary: #2d1f4e; --bg-secondary: #3d2a6e; --bg-tertiary: #4a3580;
            --text-primary: #ffffff; --text-secondary: #d4c4e8; --text-muted: #9d8bbd;
            --accent: #7c3aed; --accent-light: #a78bfa; --success: #10b981; --error: #ef4444;
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.4); --border-radius: 16px; --border-radius-lg: 24px;
            --btn-glass: rgba(255,255,255,0.08); --btn-glass-hover: rgba(255,255,255,0.15); --btn-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1030 0%, #2d1f4e 50%, #3d2a6e 100%);
            color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
        }
        .app-container { width: 100%; max-width: 420px; padding: 24px; }
        .player-card {
            background: rgba(45,31,78,0.6); backdrop-filter: blur(20px);
            border-radius: var(--border-radius-lg); border: 1px solid rgba(255,255,255,0.1);
            padding: 24px; box-shadow: var(--shadow-lg); position: relative;
        }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .radio-title { font-size: 16px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%; background: var(--btn-glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        .burger-btn .burger-line { width: 18px; height: 2px; background: white; border-radius: 1px; position: absolute; transition: 0.3s; }
        .burger-btn .burger-line:first-child { transform: translateY(-5px); }
        .burger-btn .burger-line:nth-child(3) { transform: translateY(5px); }
        .burger-btn.active .burger-line:first-child { transform: rotate(45deg); }
        .burger-btn.active .burger-line:nth-child(2) { opacity: 0; }
        .burger-btn.active .burger-line:nth-child(3) { transform: rotate(-45deg); }
        .cover-wrapper { aspect-ratio: 1; border-radius: var(--border-radius); overflow: hidden; margin-bottom: 24px; }
        .cover-art { width: 100%; height: 100%; background: linear-gradient(135deg, #7c3aed, #a78bfa); background-size: cover; background-position: center; }
        .viz-container { position: absolute; bottom:0; left:0; right:0; height:50%; opacity:0; transition:0.4s; }
        .viz-container.active { opacity:1; }
        .controls { display: flex; justify-content: center; gap: 24px; margin: 20px 0; }
        .control-btn { width:52px; height:52px; border-radius:50%; background: var(--btn-glass); border:1px solid rgba(255,255,255,0.1); color:white; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .play-btn { width:76px; height:76px; background: rgba(124,58,237,0.8); }
        .stations-overlay { position:absolute; inset:0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-radius: var(--border-radius-lg); z-index:50; display:none; align-items:center; justify-content:center; }
        .stations-overlay.open { display:flex; }
        .debug-panel { position:absolute; inset:0; background: rgba(5,2,15,0.95); backdrop-filter: blur(20px); border-radius: var(--border-radius-lg); z-index:100; display:none; flex-direction:column; padding:16px; }
        .debug-panel.open { display:flex; }
        /* остальные стили оставлены краткими для читаемости */
    </style>
</head>
<body>
    <div class="app-container">
        <div class="player-card">
            <header class="app-header">
                <div class="logo"><h1 class="radio-title">MAJESTIC RADIO</h1></div>
                <div class="header-right">
                    <div class="status-badge" id="status-badge">Оффлайн</div>
                    <button id="debug-toggle" class="icon-btn">🔧</button>
                    <button id="burger-btn" class="icon-btn burger-btn">
                        <span class="burger-line"></span><span class="burger-line"></span><span class="burger-line"></span>
                    </button>
                </div>
            </header>
            <div class="cover-wrapper">
                <div class="cover-art" id="cover-art">🎵</div>
                <div class="viz-container" id="viz-container"><canvas id="viz-canvas"></canvas></div>
            </div>
            <div class="track-info">
                <h2 class="track-title" id="track-title">—</h2>
                <p class="track-artist" id="track-artist">—</p>
            </div>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <div class="progress-time"><span id="progress-current">0:00</span><span id="progress-duration">0:00</span></div>
            </div>
            <div class="controls">
                <button class="control-btn" id="prev-btn"><svg viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 19V5h2v14H5z"/></svg></button>
                <button class="control-btn play-btn" id="play-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="next-btn"><svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm14 0v16h-2V4h2z"/></svg></button>
            </div>
            <div class="stations-overlay" id="stations-overlay">
                <div class="stations-overlay-content">
                    <h3>📻 Станции</h3>
                    <div class="stations-list" id="stations-list"></div>
                </div>
            </div>
            <div class="debug-panel" id="debug-panel">
                <div class="debug-header"><h3>🔧 Диагностика</h3><button id="debug-close">✕</button></div>
                <div class="debug-logs" id="debug-logs"></div>
                <div id="debug-tests">
                    <div class="debug-section"><div class="debug-section-title">📡 Тесты</div>
                        <button id="test-internet">🌐 Интернет</button>
                        <button id="test-cors">🔐 CORS (OPTIONS)</button>
                        <button id="test-audio">🔊 Аудио</button>
                        <button id="test-stream-headers">📋 Заголовки потока</button>
                        <div class="debug-test-result" id="test-result"></div>
                    </div>
                    <div class="debug-section"><div class="debug-section-title">📊 Аудио</div><div id="audio-state"></div></div>
                    <div class="debug-section"><div class="debug-section-title">🎨 Web Audio</div><div id="waa-state"></div></div>
                    <div class="debug-section"><div class="debug-section-title">🌍 Среда</div><div id="env-info"></div></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" preload="metadata" playsinline crossorigin="anonymous"></audio>

    <script>
        // === DEBUG ===
        const Debug = {
            logs: [], max: 200,
            init() {
                ['log','warn','error'].forEach(type => {
                    const orig = console[type];
                    console[type] = (...args) => {
                        this.add(type, args.join(' '));
                        orig.apply(console, args);
                    };
                });
                this.setupUI();
            },
            add(type, msg) {
                const time = new Date().toISOString().substr(11,8);
                this.logs.unshift({ time, type, msg });
                if (this.logs.length > this.max) this.logs.pop();
                this.render();
            },
            render() {
                const el = document.getElementById('debug-logs');
                if (!el) return;
                el.innerHTML = this.logs.map(l => `<div class="debug-entry ${l.type}"><span>[${l.time}]</span> ${l.msg}</div>`).join('');
            },
            updateAudioState() {
                const el = document.getElementById('audio-state');
                if (!el || !audio) return;
                const err = audio.error;
                el.innerHTML = `
                    <div><b>src:</b> ${audio.src ? audio.src.substring(0,50)+'...' : '—'}</div>
                    <div><b>network:</b> ${audio.networkState} <b>ready:</b> ${audio.readyState}</div>
                    <div><b>error:</b> ${err?err.code+' '+['','ABORTED','NETWORK','DECODE','SRC_NOT_SUPPORTED'][err.code]:'none'}</div>`;
            },
            updateWAAState() {
                const el = document.getElementById('waa-state');
                if (!el) return;
                const ctx = ConstellationViz.audioCtx;
                el.innerHTML = `
                    <div>AudioContext: ${ctx?ctx.state:'—'}</div>
                    <div>Analyser: ${ConstellationViz.analyser?'✅':'❌'}</div>
                    <div>SampleRate: ${ctx?ctx.sampleRate+'Hz':'—'}</div>`;
            },
            showEnv() {
                const el = document.getElementById('env-info');
                el.innerHTML = `<div><b>Origin:</b> ${location.origin}</div><div><b>UA:</b> ${navigator.userAgent.substring(0,80)}</div>`;
            },
            setupUI() {
                document.getElementById('debug-toggle').onclick = () => {
                    document.getElementById('debug-panel').classList.add('open');
                    this.updateAudioState();
                    this.updateWAAState();
                    this.showEnv();
                };
                document.getElementById('debug-close').onclick = () => document.getElementById('debug-panel').classList.remove('open');
                
                const res = document.getElementById('test-result');
                document.getElementById('test-internet').onclick = async () => {
                    res.textContent = '...'; 
                    try { await fetch('https://www.google.com/favicon.ico', {mode:'no-cors'}); res.textContent='✅ Интернет ок'; }
                    catch(e) { res.textContent='❌ '+e.message; }
                };
                document.getElementById('test-cors').onclick = async () => {
                    if (!currentStationKey) { res.textContent='Сначала выберите станцию'; return; }
                    const url = stations[currentStationKey].stream;
                    try {
                        const resp = await fetch(url, { method: 'OPTIONS', headers: {'Origin': location.origin}});
                        const cors = resp.headers.get('access-control-allow-origin');
                        res.textContent = cors ? `✅ CORS: ${cors}` : '❌ Нет заголовка';
                    } catch(e) { res.textContent='❌ Ошибка: '+e.message; }
                };
                document.getElementById('test-audio').onclick = async () => {
                    if (!currentStationKey) return;
                    const testAudio = new Audio();
                    testAudio.crossOrigin = 'anonymous';
                    testAudio.src = stations[currentStationKey].stream + '?t='+Date.now();
                    try {
                        await new Promise((resolve, reject) => {
                            const t = setTimeout(() => reject(new Error('Timeout')), 5000);
                            testAudio.oncanplay = () => { clearTimeout(t); resolve(); };
                            testAudio.onerror = () => { clearTimeout(t); reject(testAudio.error); };
                        });
                        res.textContent = '✅ Аудио доступно';
                    } catch(e) {
                        res.textContent = '❌ Ошибка: ' + (e.message || e.code);
                    }
                };
                document.getElementById('test-stream-headers').onclick = async () => {
                    if (!currentStationKey) return;
                    const url = stations[currentStationKey].stream + '?t='+Date.now();
                    res.textContent = 'Загрузка...';
                    try {
                        const resp = await fetch(url, { method: 'GET', headers: {'Range': 'bytes=0-0'} });
                        const headers = {};
                        resp.headers.forEach((val, key) => headers[key] = val);
                        res.innerHTML = `<pre>Status: ${resp.status}\n${JSON.stringify(headers, null, 2)}</pre>`;
                    } catch(e) {
                        res.textContent = '❌ '+e.message;
                    }
                };
            }
        };

        // === CONSTELLATION VISUALIZER ===
        const ConstellationViz = {
            audioCtx: null, analyser: null, sourceNode: null,
            init(audioElement) {
                if (this.audioCtx) return true;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.audioCtx = new AudioContext();
                    this.analyser = this.audioCtx.createAnalyser();
                    this.analyser.fftSize = 2048;
                    this.analyser.smoothingTimeConstant = 0.75;
                    this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
                    this.sourceNode = this.audioCtx.createMediaElementSource(audioElement);
                    this.sourceNode.connect(this.analyser);
                    this.analyser.connect(this.audioCtx.destination);
                    this.nodes = Array.from({length:48}, ()=>({x:0,y:0,energy:0,targetY:0}));
                    return true;
                } catch(e) {
                    Debug.add('error', 'ConstellationViz init: '+e.message);
                    return false;
                }
            },
            start() { /* ... без изменений, см. полный код выше */ },
            stop() { /* ... */ },
            cleanup() {
                this.stop();
                if (this.sourceNode) try { this.sourceNode.disconnect(); } catch(e) {}
                if (this.analyser) try { this.analyser.disconnect(); } catch(e) {}
                if (this.audioCtx && this.audioCtx.state !== 'closed') {
                    this.audioCtx.close().catch(()=>{});
                    this.audioCtx = null;
                }
                this.sourceNode = null;
                this.analyser = null;
            }
        };
        // (здесь полностью тот же код ConstellationViz, что и в прошлом ответе, для краткости опущен)
        // ВАЖНО: вставьте его полностью из предыдущего полного HTML.

        // === RADIO APP (исправленная версия) ===
        const stations = {};
        let currentStationKey = null;
        const audio = document.getElementById('audio-player');
        // ... остальные переменные и функции, идентично предыдущему ответу, но с важными изменениями:

        function switchStation(key, autoPlay=true) {
            if (!stations[key]) return;
            playbackStarted = false;
            currentStationKey = key;
            stopPlayback();
            // Полный сброс контекста
            ConstellationViz.cleanup();
            audio.__captured = false;
            setCoverArt(stations[key].art);
            renderStationsList();
            if (autoPlay) startPlayback(stations[key]);
        }

        function startPlayback(station) {
            if (isProcessingPlay) return;
            isProcessingPlay = true;
            if (playTimeout) clearTimeout(playTimeout);
            Debug.add('info', 'Start playback: '+station.name);
            playbackStarted = false;
            ConstellationViz.stop();
            updateStatus('loading');
            audio.src = `${station.stream}?t=${Date.now()}`;
            audio.load();

            // Инициализация контекста только если нет активного и аудио не захвачено
            if (!ConstellationViz.audioCtx && !audio.__captured) {
                const ok = ConstellationViz.init(audio);
                if (ok) {
                    audio.__captured = true;
                    if (ConstellationViz.audioCtx.state === 'suspended') {
                        ConstellationViz.audioCtx.resume();
                    }
                }
            }

            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true; playbackStarted = true;
                    updatePlayButton();
                    updateStatus('online');
                    ConstellationViz.start();
                    fetchMetadata(station.api);
                    metadataInterval = setInterval(() => fetchMetadata(station.api), 10000);
                    setTimeout(() => { isProcessingPlay = false; }, 1000);
                }).catch(err => {
                    Debug.add('error', 'Play failed: '+err.name);
                    updateStatus('error');
                    isPlaying = false; playbackStarted = false;
                    updatePlayButton();
                    ConstellationViz.stop();
                    isProcessingPlay = false;
                });
            }
            playTimeout = setTimeout(() => {
                if (!isPlaying && !audio.paused) {
                    Debug.add('warn', 'Play timeout');
                    audio.pause(); audio.src = '';
                    updateStatus('error', 'timeout');
                    isProcessingPlay = false;
                }
            }, 10000);
        }

        // ... все остальные функции и инициализация
        // Вставьте их полностью из предыдущего исправленного HTML, заменив только Debug.add на Debug.add
    </script>
</body>
</html>
