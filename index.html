<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic Radio</title>
    <!-- PWA & Mobile Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Majestic Radio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2d1f4e">
    <link rel="manifest" href="manifest.json">
    
    <!-- Fonts via fontsource -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/index.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    
    <style>
        :root {
            --bg-primary: #2d1f4e; --bg-secondary: #3d2a6e; --bg-tertiary: #4a3580;
            --text-primary: #ffffff; --text-secondary: #d4c4e8; --text-muted: #9d8bbd;
            --accent: #7c3aed; --accent-light: #a78bfa; --success: #10b981; --error: #ef4444;
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.4); --border-radius: 16px; --border-radius-lg: 24px;
            --btn-glass: rgba(255, 255, 255, 0.08); --btn-glass-hover: rgba(255, 255, 255, 0.15); --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1030 0%, #2d1f4e 50%, #3d2a6e 100%);
            color: var(--text-primary); min-height: 100vh; min-height: -webkit-fill-available;
            overflow-x: hidden; display: flex; justify-content: center; align-items: flex-start;
        }
        .app-container { width: 100%; max-width: 420px; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .player-card {
            width: 100%; background: rgba(45, 31, 78, 0.6); backdrop-filter: blur(20px);
            border-radius: var(--border-radius-lg); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px; box-shadow: var(--shadow-lg); position: relative; overflow: hidden;
        }
        .app-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; margin-bottom: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .radio-title { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: 1px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .burger-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--btn-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--btn-shadow); position: relative; z-index: 60;
        }
        .burger-btn:hover { background: var(--btn-glass-hover); transform: translateY(-1px); border-color: rgba(255, 255, 255, 0.3); }
        .burger-btn .burger-line {
            width: 18px; height: 2px; background: var(--text-primary); border-radius: 1px;
            position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .burger-btn .burger-line:first-child { transform: translateY(-5px); }
        .burger-btn .burger-line:nth-child(3) { transform: translateY(5px); }
        .burger-btn.active .burger-line:first-child { transform: rotate(45deg); }
        .burger-btn.active .burger-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .burger-btn.active .burger-line:nth-child(3) { transform: rotate(-45deg); }

        .cover-wrapper {
            position: relative; width: 100%; margin-bottom: 24px; border-radius: var(--border-radius);
            overflow: hidden; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5); aspect-ratio: 1;
        }
        .cover-art {
            width: 100%; height: 100%; background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            display: flex; align-items: center; justify-content: center; font-size: 80px;
            background-size: cover; background-position: center; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cover-art.playing { animation: pulse-slow 6s ease-in-out infinite; }
        .cover-placeholder { opacity: 0.6; color: white; }
        @keyframes pulse-slow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        /* ===== CONSTELLATION VISUALIZER ===== */
        .viz-container {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            background: linear-gradient(to top, rgba(10,5,20,0.75) 0%, transparent 60%);
            border-radius: var(--border-radius);
            overflow: hidden;
        }
        .viz-container.active { opacity: 1; }
        #viz-canvas {
            width: 100%; height: 100%; display: block;
        }

        .track-info { text-align: center; margin-bottom: 20px; min-height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .track-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); line-height: 1.3; min-height: 32px; transition: opacity 0.2s ease; }
        .track-title.placeholder { opacity: 0.5; }
        .track-artist { font-size: 17px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 400; min-height: 24px; transition: opacity 0.2s ease; }
        .track-artist.placeholder { opacity: 0.5; }
        
        .progress-container { width: 100%; margin-bottom: 24px; min-height: 36px; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; }
        .progress-container.active { opacity: 1; visibility: visible; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 2px; overflow: hidden; position: relative; cursor: default; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 2px; transition: width 0.3s ease; }
        .progress-time { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 32px; }
        .control-btn {
            width: 52px; height: 52px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--btn-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--btn-shadow);
        }
        .control-btn svg { width: 20px; height: 20px; fill: currentColor; transition: transform 0.2s; }
        .control-btn:hover { background: var(--btn-glass-hover); transform: translateY(-2px); }
        .control-btn:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.2); }
        
        .play-btn {
            width: 76px; height: 76px; background: linear-gradient(135deg, rgba(124, 58, 237, 0.8), rgba(167, 139, 250, 0.8));
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); color: white;
            border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-btn svg { width: 28px; height: 28px; fill: white; }
        .play-btn:hover { background: linear-gradient(135deg, rgba(124, 58, 237, 0.95), rgba(167, 139, 250, 0.95)); transform: translateY(-3px) scale(1.05); }
        .play-btn:active { transform: scale(0.95); }

        .stations-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
            border-radius: var(--border-radius-lg); z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 32px 24px; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
            transform: scale(0.95);
        }
        .stations-overlay.open { opacity: 1; visibility: visible; transform: scale(1); }
        .stations-overlay-content { display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 1; pointer-events: auto; }
        .stations-overlay-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); }
        .stations-list { width: 100%; display: flex; flex-direction: column; gap: 8px; max-height: 60vh; overflow-y: auto; padding: 4px; }
        .station-item {
            width: 100%; padding: 14px 18px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary); font-size: 14px; cursor: pointer;
            transition: all 0.2s ease; font-family: inherit; font-weight: 500;
            text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .station-item:hover { background: rgba(255, 255, 255, 0.12); }
        .station-item:active { transform: scale(0.98); }
        .station-item.active { background: rgba(124, 58, 237, 0.3); border-color: var(--accent); }
        .station-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
        .station-item.active .station-dot { background: var(--success); box-shadow: 0 0 8px rgba(16, 185, 129, 0.6); }
        .stations-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px; }
        
        .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: var(--text-muted); display: flex; align-items: center; gap: 4px; font-weight: 500; }
        .status-badge.online { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-badge.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        
        @media (max-height: 700px) { .cover-wrapper { max-width: 100%; } .track-title { font-size: 22px; } .app-container { padding: 16px; } }
        @media (max-width: 400px) { .play-btn { width: 68px; height: 68px; } .controls { gap: 20px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="player-card">
            <header class="app-header">
                <div class="logo"><h1 class="radio-title">MAJESTIC RADIO</h1></div>
                <div class="header-right">
                    <div class="status-badge" id="status-badge"><span>Оффлайн</span></div>
                    <button class="burger-btn" id="burger-btn" title="Станции">
                        <span class="burger-line"></span><span class="burger-line"></span><span class="burger-line"></span>
                    </button>
                </div>
            </header>
            <div class="cover-wrapper">
                <div class="cover-art" id="cover-art"><div class="cover-placeholder">🎵</div></div>
                <div class="viz-container" id="viz-container">
                    <canvas id="viz-canvas"></canvas>
                </div>
            </div>
            <div class="track-info">
                <h2 class="track-title placeholder" id="track-title">—</h2>
                <p class="track-artist placeholder" id="track-artist">—</p>
            </div>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <div class="progress-time"><span id="progress-current">0:00</span><span id="progress-duration">0:00</span></div>
            </div>
            <div class="controls">
                <button class="control-btn" id="prev-btn" title="Предыдущая станция"><svg viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 19V5h2v14H5z"/></svg></button>
                <button class="control-btn play-btn" id="play-btn" title="Play/Pause">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="next-btn" title="Следующая станция"><svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm14 0v16h-2V4h2z"/></svg></button>
            </div>

            <div class="stations-overlay" id="stations-overlay">
                <div class="stations-overlay-content">
                    <div class="stations-overlay-title">📻 Станции</div>
                    <div class="stations-list" id="stations-list"><div class="stations-empty">Загрузка станций...</div></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" preload="metadata" playsinline webkit-playsinline crossorigin="anonymous"></audio>
    
    <script>
        // ===========================
        // 🎨 CONSTELLATION VISUALIZER
        // ===========================
        const _cViz = {
            ctx: null, analyser: null, srcNode: null, freqData: null, animId: null,
            running: false, audioCtx: null,
            CONFIG: { NUM_NODES: 48, CONN_DISTANCE: 45, FFT_SIZE: 2048, SMOOTHING: 0.75, MAX_FREQ: 10000, NODE_HEIGHT: 0.75, BASE_Y: 0.85 },
            nodes: [],
            init(audioElement) {
                if (this.audioCtx) return true;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.audioCtx = new AudioContext();
                    this.analyser = this.audioCtx.createAnalyser();
                    this.analyser.fftSize = this.CONFIG.FFT_SIZE;
                    this.analyser.smoothingTimeConstant = this.CONFIG.SMOOTHING;
                    this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
                    this.srcNode = this.audioCtx.createMediaElementSource(audioElement);
                    this.srcNode.connect(this.analyser);
                    this.analyser.connect(this.audioCtx.destination);
                    return true;
                } catch (e) { 
                    console.warn('Visualizer init failed (CORS likely blocked):', e); 
                    return false; 
                }
            },
            draw() {
                const c = document.getElementById('viz-canvas');
                if (!c) return;
                const ctx = this.ctx || c.getContext('2d');
                this.ctx = ctx;
                const dpr = window.devicePixelRatio || 1;
                const rect = c.getBoundingClientRect();
                c.width = rect.width * dpr;
                c.height = rect.height * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                const w = rect.width, h = rect.height;
                ctx.clearRect(0, 0, w, h);
                if (!this.analyser || !this.freqData) { this.animId = requestAnimationFrame(() => this.draw()); return; }
                this.analyser.getByteFrequencyData(this.freqData);
                const binWidth = this.audioCtx.sampleRate / this.analyser.fftSize;
                const maxBin = Math.min(this.freqData.length - 1, Math.floor(this.CONFIG.MAX_FREQ / binWidth));
                if (this.nodes.length !== this.CONFIG.NUM_NODES) {
                    this.nodes = [];
                    for (let i = 0; i < this.CONFIG.NUM_NODES; i++) this.nodes.push({ x: 0, y: 0, energy: 0, targetY: 0 });
                }
                for (let i = 0; i < this.CONFIG.NUM_NODES; i++) {
                    const ratio = i / (this.CONFIG.NUM_NODES - 1);
                    const bin = Math.max(0, Math.floor(ratio * maxBin));
                    const val = this.freqData[bin] / 255;
                    this.nodes[i].x = ratio * w;
                    this.nodes[i].targetY = h * this.CONFIG.BASE_Y - (val * h * this.CONFIG.NODE_HEIGHT);
                    this.nodes[i].y += (this.nodes[i].targetY - this.nodes[i].y) * 0.15;
                    this.nodes[i].energy = val;
                }
                ctx.lineWidth = 0.8;
                for (let i = 0; i < this.CONFIG.NUM_NODES; i++) {
                    for (let j = i + 1; j < this.CONFIG.NUM_NODES; j++) {
                        const dx = this.nodes[i].x - this.nodes[j].x;
                        const dy = this.nodes[i].y - this.nodes[j].y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < this.CONFIG.CONN_DISTANCE * this.CONFIG.CONN_DISTANCE) {
                            const dist = Math.sqrt(distSq);
                            const alpha = (1 - dist / this.CONFIG.CONN_DISTANCE) * 0.35 * (0.4 + this.nodes[i].energy + this.nodes[j].energy);
                            ctx.strokeStyle = `rgba(180, 160, 255, ${Math.max(0, Math.min(1, alpha))})`;
                            ctx.beginPath();
                            ctx.moveTo(this.nodes[i].x, this.nodes[i].y);
                            ctx.lineTo(this.nodes[j].x, this.nodes[j].y);
                            ctx.stroke();
                        }
                    }
                }
                for (let i = 0; i < this.CONFIG.NUM_NODES; i++) {
                    const n = this.nodes[i];
                    const r = 1.2 + n.energy * 3.5;
                    const alpha = 0.4 + n.energy * 0.6;
                    ctx.shadowColor = `rgba(167, 139, 250, ${alpha * 0.6})`;
                    ctx.shadowBlur = 6;
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                this.animId = requestAnimationFrame(() => this.draw());
            },
            start() {
                document.getElementById('viz-container').classList.add('active');
                if (!this.running) {
                    this.running = true;
                    cancelAnimationFrame(this.animId);
                    this.draw();
                }
            },
            stop() {
                document.getElementById('viz-container').classList.remove('active');
                this.running = false;
                cancelAnimationFrame(this.animId);
                if (this.ctx) {
                    const c = document.getElementById('viz-canvas');
                    const rect = c.getBoundingClientRect();
                    this.ctx.clearRect(0, 0, rect.width, rect.height);
                }
            },
            cleanup() {
                this.stop();
                if (this.srcNode) { try { this.srcNode.disconnect(); } catch(e) {} this.srcNode = null; }
                if (this.analyser) { try { this.analyser.disconnect(); } catch(e) {} this.analyser = null; }
                if (this.audioCtx && this.audioCtx.state !== 'closed') { this.audioCtx.close().catch(() => {}); this.audioCtx = null; }
            }
        };

        // ===========================
        // 📻 RADIO APP
        // ===========================
        const STREAM_URLS = {
            liquid_drum: 'https://majesticradio.duckdns.org/listen/liquid_drum/liquiddrum.mp3',
            drum__bass: 'https://majesticradio.duckdns.org/listen/drum__bass/drumnbass.mp3',
            psy_chill: 'https://majesticradio.duckdns.org/listen/psy_chill/psychill.mp3',
            old_goa: 'https://majesticradio.duckdns.org/listen/old_goa/oldgoa.mp3',
            progressive_psytrance: 'https://majesticradio.duckdns.org/listen/progressive_psytrance/psyprog.mp3',
            psy_tech: 'https://majesticradio.duckdns.org/listen/psy_tech/psytech.mp3',
            dark_room: 'https://majesticradio.duckdns.org/listen/dark_room/darkroot.mp3'
        };
        const BASE_URL = 'https://majesticradio.duckdns.org';
        const STATION_IDS = ['liquid_drum','drum__bass','psy_chill','old_goa','progressive_psytrance','psy_tech','dark_room'];
        const STATION_NAMES = {
            liquid_drum: 'Liquid Drum', drum__bass: 'Drum & Bass', psy_chill: 'Psy Chill',
            old_goa: 'Old Goa', progressive_psytrance: 'Progressive Psy', psy_tech: 'Psy Tech', dark_room: 'Dark Room'
        };

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn'), prevBtn = document.getElementById('prev-btn'), nextBtn = document.getElementById('next-btn');
        const burgerBtn = document.getElementById('burger-btn'), stationsOverlay = document.getElementById('stations-overlay');
        const stationsListEl = document.getElementById('stations-list'), coverArt = document.getElementById('cover-art');
        const trackTitleEl = document.getElementById('track-title'), trackArtistEl = document.getElementById('track-artist');
        const statusBadge = document.getElementById('status-badge'), progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill'), progressCurrent = document.getElementById('progress-current');
        const progressDuration = document.getElementById('progress-duration');
        const playIcon = document.getElementById('play-icon'), pauseIcon = document.getElementById('pause-icon');

        let stations = {}, currentStationKey = null, isPlaying = false, playbackStarted = false;
        let metadataInterval = null, progressInterval = null, errorTimeout = null;
        let trackData = { duration: 0, elapsed: 0, lastUpdate: 0 }, stationsOpen = false;

        const DEFAULT_COVER_SVG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%237c3aed'/%3E%3Cstop offset='100%25' style='stop-color:%23a78bfa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='300' height='300' fill='url(%23g)'/%3E%3Ctext x='150' y='160' text-anchor='middle' font-family='Arial' font-size='80' fill='white' opacity='0.6'%3E🎵%3C/text%3E%3C/svg%3E";

        function formatTime(seconds) { if (!seconds || seconds < 0) return '0:00'; return `${Math.floor(seconds / 60)}:${Math.floor(seconds % 60).toString().padStart(2, '0')}`; }
        function updateProgress(elapsed, duration) {
            if (!duration || duration <= 0) return void progressContainer.classList.remove('active');
            progressContainer.classList.add('active');
            const percent = Math.min(100, Math.max(0, (elapsed / duration) * 100));
            progressFill.style.width = `${percent}%`; progressCurrent.textContent = formatTime(elapsed); progressDuration.textContent = formatTime(duration);
        }
        function startProgressAnimation() {
            progressInterval && clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (!isPlaying || !trackData.duration) return;
                const elapsed = trackData.elapsed + (Date.now() - trackData.lastUpdate) / 1000;
                elapsed < trackData.duration && updateProgress(elapsed, trackData.duration);
            }, 500);
        }
        function stopProgressAnimation() { progressInterval && (clearInterval(progressInterval), progressInterval = null); progressContainer.classList.remove('active'); }
        function updateStatus(online) {
            statusBadge.classList.remove('online', 'error');
            if (online) statusBadge.classList.add('online'), statusBadge.innerHTML = '<span>В эфире</span>';
            else statusBadge.innerHTML = '<span>Оффлайн</span>';
        }
        function initPlaceholders() { trackTitleEl.classList.add('placeholder'); trackArtistEl.classList.add('placeholder'); }
        function openStations() { stationsOpen = true; stationsOverlay.classList.add('open'); burgerBtn.classList.add('active'); }
        function closeStations() { stationsOpen = false; stationsOverlay.classList.remove('open'); burgerBtn.classList.remove('active'); }
        function toggleStations() { stationsOpen ? closeStations() : openStations(); }
        function renderStationsList() {
            if (!stationsListEl) return;
            const keys = Object.keys(stations);
            if (keys.length === 0) { stationsListEl.innerHTML = '<div class="stations-empty">Нет доступных станций</div>'; return; }
            stationsListEl.innerHTML = '';
            keys.forEach((key) => {
                const station = stations[key];
                const btn = document.createElement('button');
                btn.className = `station-item${key === currentStationKey ? ' active' : ''}`;
                btn.innerHTML = `<span class="station-dot"></span><span>${station.name}</span>`;
                btn.addEventListener('click', (e) => { e.stopPropagation(); switchStation(key, true); closeStations(); });
                stationsListEl.appendChild(btn);
            });
        }
        function initStationsStatic() {
            stations = {};
            STATION_IDS.forEach((id) => { stations[id] = { name: STATION_NAMES[id] || id, stream: STREAM_URLS[id], api: `${BASE_URL}/api/nowplaying/${id}`, art: DEFAULT_COVER_SVG }; });
            renderStationsList();
            currentStationKey = STATION_IDS[0];
            setCoverArt(DEFAULT_COVER_SVG);
        }
        async function loadStationsBackground() {
            const promises = STATION_IDS.map(async (stationId) => {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);
                    const response = await fetch(`${BASE_URL}/api/nowplaying/${stationId}`, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (response.ok) {
                        const data = await response.json();
                        let artUrl = DEFAULT_COVER_SVG;
                        if (data.now_playing?.song?.art?.trim()) { artUrl = data.now_playing.song.art; if (!artUrl.startsWith('http')) artUrl = BASE_URL + artUrl; }
                        else if (data.station?.front_art?.trim()) { artUrl = data.station.front_art; if (!artUrl.startsWith('http')) artUrl = BASE_URL + artUrl; }
                        if (stations[stationId]) { stations[stationId].name = data.station?.name || stations[stationId].name; stations[stationId].art = artUrl; }
                        if (stationId === currentStationKey) setCoverArt(artUrl);
                        renderStationsList();
                    }
                } catch (e) {}
            });
            await Promise.all(promises);
        }
        function switchStation(key, autoPlay = true) {
            const station = stations[key]; if (!station) return;
            playbackStarted = false; currentStationKey = key; stopPlayback(); setCoverArt(station.art); renderStationsList();
            if (autoPlay) startPlayback(station);
        }
        function setCoverArt(artUrl) {
            if (!coverArt) return;
            if (artUrl?.trim()) {
                const img = new Image();
                img.onload = () => { coverArt.style.backgroundImage = `url('${artUrl}')`; coverArt.querySelector('.cover-placeholder').style.display = 'none'; };
                img.onerror = () => { coverArt.style.backgroundImage = `url('${DEFAULT_COVER_SVG}')`; coverArt.querySelector('.cover-placeholder').style.display = 'none'; };
                img.src = artUrl;
            } else { coverArt.style.backgroundImage = `url('${DEFAULT_COVER_SVG}')`; coverArt.querySelector('.cover-placeholder').style.display = 'none'; }
        }
        
        // === МОБИЛЬНО-ОПТИМИЗИРОВАННЫЙ ЗАПУСК ===
        function startPlayback(station) {
            console.log(`🎵 Playing: ${station.stream}`);
            
            // 1. Инициализация AudioContext внутри жеста пользователя (критично для iOS/Android)
            if (!_cViz.audioCtx) {
                const ok = _cViz.init(audio);
                if (!ok) console.warn('Визуализатор не инициализирован (CORS), но радио будет играть.');
            }
            if (_cViz.audioCtx && _cViz.audioCtx.state === 'suspended') {
                _cViz.audioCtx.resume().catch(() => {});
            }

            playbackStarted = false;
            audio.src = `${station.stream}?t=${Date.now()}`;
            audio.muted = false; // Фикс для iOS, где аудио иногда создаётся muted
            audio.volume = 1.0;
            audio.load(); // Принудительно готовим поток для мобильных браузеров

            // 2. Синхронный вызов play() без setTimeout (сохраняет контекст жеста)
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    playbackStarted = true;
                    updatePlayButton();
                    if (_cViz.audioCtx) _cViz.start();
                    updateStatus(true);
                    errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null);
                    fetchMetadata(station.api);
                    metadataInterval && clearInterval(metadataInterval);
                    metadataInterval = setInterval(() => fetchMetadata(station.api), 10000);
                }).catch(err => {
                    console.error('❌ Playback error:', err.name, err.message);
                    if (err.name === 'NotAllowedError') {
                        // Браузер заблокировал автоплей. Ждём следующего жеста.
                        statusBadge.innerHTML = '<span>Нажмите Play</span>';
                        updateStatus(false);
                    } else {
                        updateStatus(false);
                    }
                });
            }
        }

        function stopPlayback() {
            audio.pause(); audio.src = ''; isPlaying = false; playbackStarted = false; updatePlayButton();
            _cViz.stop(); stopProgressAnimation(); updateStatus(false);
            metadataInterval && (clearInterval(metadataInterval), metadataInterval = null);
            errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null);
            trackData = { duration: 0, elapsed: 0, lastUpdate: 0 };
        }
        function togglePlay() { currentStationKey && stations[currentStationKey] && (isPlaying ? stopPlayback() : startPlayback(stations[currentStationKey])); }
        function updatePlayButton() { playIcon.style.display = isPlaying ? 'none' : 'block'; pauseIcon.style.display = isPlaying ? 'block' : 'none'; coverArt.classList.toggle('playing', isPlaying); }
        async function fetchMetadata(apiUrl) {
            if (!isPlaying) return;
            try {
                const response = await fetch(`${apiUrl}?r=${Math.random()}`, { cache: 'no-store' });
                if (!response.ok) return;
                const data = await response.json(), song = data?.now_playing?.song, { duration, elapsed } = data?.now_playing || {};
                if (song) { trackTitleEl.textContent = song.title || 'Unknown Track'; trackArtistEl.textContent = song.artist || 'Unknown Artist'; trackTitleEl.classList.remove('placeholder'); trackArtistEl.classList.remove('placeholder'); if (song.art?.trim()) { let artUrl = song.art; artUrl.startsWith('http') || (artUrl = BASE_URL + artUrl); setCoverArt(artUrl); } }
                if (duration && elapsed !== undefined) { trackData = { duration, elapsed, lastUpdate: Date.now() }; updateProgress(elapsed, duration); startProgressAnimation(); }
            } catch (e) {}
        }
        function setupEventListeners() {
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', () => { const keys = Object.keys(stations); if (!keys.length) return; const idx = keys.indexOf(currentStationKey); switchStation(keys[idx <= 0 ? keys.length - 1 : idx - 1]); });
            nextBtn.addEventListener('click', () => { const keys = Object.keys(stations); if (!keys.length) return; const idx = keys.indexOf(currentStationKey); switchStation(keys[idx >= keys.length - 1 ? 0 : idx + 1]); });
            burgerBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleStations(); });
            stationsOverlay.addEventListener('click', (e) => { e.target === stationsOverlay && closeStations(); });
            let touchStartX = 0, touchStartY = 0, isSwiping = false;
            stationsOverlay.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; isSwiping = true; }, { passive: true });
            stationsOverlay.addEventListener('touchend', (e) => { if (!isSwiping) return; isSwiping = false; const diffX = e.changedTouches[0].screenX - touchStartX; const diffY = e.changedTouches[0].screenY - touchStartY; diffY > 80 && Math.abs(diffX) < 0.5 * Math.abs(diffY) && closeStations(); }, { passive: true });
            let globalStartX = 0, globalStartY = 0;
            document.addEventListener('touchstart', (e) => { globalStartX = e.changedTouches[0].screenX; globalStartY = e.changedTouches[0].screenY; }, { passive: true });
            document.addEventListener('touchend', (e) => {
                if (stationsOpen) return;
                const diffX = globalStartX - e.changedTouches[0].screenX, diffY = e.changedTouches[0].screenY - globalStartY;
                Math.abs(diffX) > 50 && Math.abs(diffX) > 1.5 * Math.abs(diffY) && (diffX > 0 ? nextBtn.click() : prevBtn.click());
            }, { passive: true });
            audio.addEventListener('error', () => { console.log('🔊 Audio error'); updateStatus(false); });
            audio.addEventListener('playing', () => { playbackStarted = true; updateStatus(true); errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null); });
        }

        try {
            initPlaceholders();
            setupEventListeners();
            initStationsStatic();
            loadStationsBackground();
        } catch (e) { console.error("Init Error:", e); }

        if (window.Telegram && window.Telegram.WebApp) {
            try {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand && tg.expand();
                if (tg.themeParams) {
                    if (tg.themeParams.bg_color) document.documentElement.style.setProperty('--bg-primary', tg.themeParams.bg_color);
                    if (tg.themeParams.text_color) document.documentElement.style.setProperty('--text-primary', tg.themeParams.text_color);
                }
            } catch (e) {}
        }

        window.addEventListener('resize', () => {
            if (_cViz.ctx) {
                const c = document.getElementById('viz-canvas');
                const dpr = window.devicePixelRatio || 1;
                const rect = c.getBoundingClientRect();
                c.width = rect.width * dpr;
                c.height = rect.height * dpr;
            }
        });
        window.addEventListener('beforeunload', () => { stopPlayback(); _cViz.cleanup(); });
        window.RadioApp = { stations, currentStationKey, switchStation, togglePlay, audio };
    </script>
</body>
</html>
