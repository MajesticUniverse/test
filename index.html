<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Drum · Визуализатор</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050a14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .player {
            max-width: 700px;
            width: 100%;
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 24px;
            border: 1px solid rgba(0, 160, 255, 0.4);
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .song-info {
            text-align: center;
            margin-bottom: 25px;
        }
        .song-title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #7bc5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .song-artist {
            color: #9bb7d4;
            margin-top: 8px;
        }
        canvas {
            width: 100%;
            height: 180px;
            background: #01040b;
            border-radius: 24px;
            display: block;
            margin: 20px 0;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            background: #1f3a5f;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); background: #2c5a9e; }
        .status {
            text-align: center;
            margin-top: 20px;
            color: #7b9bc2;
            font-size: 0.85rem;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #4a627a;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="player">
    <div class="song-info">
        <div class="song-title" id="songTitle">Liquid Drum</div>
        <div class="song-artist" id="songArtist">—</div>
    </div>
    <canvas id="visualizer" width="800" height="180"></canvas>
    <div class="controls">
        <button id="playBtn">▶ Включить</button>
        <button id="stopBtn">⏹ Выключить</button>
    </div>
    <div class="status" id="statusMsg">⚡ Готов к прослушиванию</div>
    <footer>🎛 Визуализация в реальном времени · Адаптивный ритм</footer>
</div>

<script>
    // ---------- НАСТРОЙКИ (ваши) ----------
    const STREAM_URL = 'https://majesticradio.duckdns.org/listen/liquid_drum/liquiddrum.mp3';
    const API_URL = 'https://majesticradio.duckdns.org/api/nowplaying/1';

    let audio = null;
    let isPlaying = false;
    let animationId = null;
    let canvas = document.getElementById('visualizer');
    let ctx = canvas.getContext('2d');
    let width, height;

    // Функция обновления информации о треке
    async function updateMetadata() {
        try {
            let res = await fetch(API_URL);
            if (!res.ok) throw new Error();
            let data = await res.json();
            if (data.now_playing && data.now_playing.song) {
                document.getElementById('songTitle').innerText = data.now_playing.song.title || 'Liquid Drum';
                document.getElementById('songArtist').innerText = data.now_playing.song.artist || '—';
            }
        } catch(e) {
            console.warn("Метаданные не загружены");
        }
    }
    updateMetadata();
    setInterval(updateMetadata, 12000);

    // ---------- ПСЕВДО-ВИЗУАЛИЗАТОР (случайный, но ритмичный) ----------
    function startFakeVisualizer() {
        const barsCount = 64;
        let time = 0;
        let velocities = new Array(barsCount).fill(0);

        function resizeCanvas() {
            width = canvas.clientWidth;
            height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function draw() {
            if (!isPlaying) {
                if (animationId) cancelAnimationFrame(animationId);
                animationId = null;
                ctx.fillStyle = '#01040b';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#2d5980';
                ctx.font = '14px monospace';
                ctx.fillText('⏸ Остановлено', width/2 - 50, height/2);
                return;
            }

            time += 0.08;
            const barWidth = width / barsCount * 1.2;
            let x = 0;

            for (let i = 0; i < barsCount; i++) {
                // Создаём плавное движение: синусоидальная волна + случайный шум
                let intensity = 0.3 + 0.5 * Math.sin(time * 2.5 + i * 0.2);
                intensity += 0.2 * Math.sin(time * 5.3 + i * 0.5);
                intensity = Math.min(0.95, Math.max(0.1, intensity));
                // добавляем инерцию для мягкости
                velocities[i] = velocities[i] * 0.8 + intensity * 0.2;
                let barHeight = velocities[i] * height * 0.85;
                let hue = 200 + velocities[i] * 140;
                ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
                ctx.fillRect(x, height - barHeight, barWidth - 1, barHeight);
                x += barWidth;
            }
            animationId = requestAnimationFrame(draw);
        }
        draw();
    }

    // ---------- ЗАПУСК АУДИО (без CORS, только звук) ----------
    async function startPlayback() {
        if (audio && isPlaying) return;
        if (audio) {
            audio.pause();
            audio.src = '';
        }
        audio = new Audio();
        audio.src = STREAM_URL;
        audio.autoplay = true;

        try {
            await audio.play();
            isPlaying = true;
            document.getElementById('statusMsg').innerHTML = '🎶 Играет · Визуализация активна';
            startFakeVisualizer();
        } catch(err) {
            console.error(err);
            document.getElementById('statusMsg').innerHTML = '❌ Ошибка: не удалось запустить аудио';
            isPlaying = false;
        }
    }

    function stopPlayback() {
        if (audio) {
            audio.pause();
            audio.src = '';
        }
        isPlaying = false;
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        document.getElementById('statusMsg').innerHTML = '⏹ Остановлено';
        // очистить canvas
        ctx.fillStyle = '#01040b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#3c6b92';
        ctx.font = '14px monospace';
        ctx.fillText('Спектр остановлен', canvas.width/2-70, canvas.height/2);
    }

    document.getElementById('playBtn').onclick = startPlayback;
    document.getElementById('stopBtn').onclick = stopPlayback;
</script>
</body>
</html>
