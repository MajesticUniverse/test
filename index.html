
                        <!DOCTYPE html>

                            <meta charset="UTF-8">

              <style>
                body {
                  background-color: white; /* Ensure the iframe has a white background */
                }

                
              </style>

                        <body>
                            <audio id="audio-player" preload="none" playsinline></audio>



              <script>
                              // В startPlayback():
audio.removeAttribute('crossorigin');
audio.src = `${station.stream}?t=${Date.now()}`;

// В draw():
let totalEnergy = 0;
for (let i = 0; i <= maxFreqBin; i++) totalEnergy += this.freqData[i];
const hasSignal = totalEnergy > Math.max(1500, maxFreqBin * 1.5);
this.syntheticPhase += 0.04;

// В цикле обновления узлов:
const rawVal = this.freqData[bin] / 255;
const syntheticVal = 0.1 + 0.25 * (0.5 + 0.5 * Math.sin(this.syntheticPhase + ratio * 8)) + Math.random() * 0.08;
const val = hasSignal ? rawVal : Math.min(0.45, syntheticVal); // ← Фолбэк!

if (!hasSignal && ConstellationViz.syntheticPhase % 100 < 1) {
    console.log('🎭 Using synthetic animation (CORS blocked real data)');
}

// В startVisualizer():
if (ConstellationViz.audioCtx?.state === 'suspended') {
    ConstellationViz.audioCtx.resume().then(() => {
        // Гарантия, что контекст разбужен до начала draw()
        ConstellationViz.start();
    }).catch(e => console.error('Failed to resume:', e));
}

audio.addEventListener('waiting', () => {
    statusBadge.textContent = '🔄 Буферизация...';
});
audio.addEventListener('stalled', () => {
    statusBadge.textContent = '⚠️ Поток задерживается';
});


              </script>
                        </body>
                        </html>
