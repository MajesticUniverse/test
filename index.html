<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic Radio with Visualizer</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2d1f4e">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <style>
        /* Add the required CSS styles for your page and visualizer */
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2d1f4e;
            color: #fff;
            margin: 0;
            height: 100vh;
        }
        .visualizer-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
        }
        .radio-controls {
            margin-top: 16px;
        }
        button {
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="player-card">
            <!-- Visualizer area -->
            <div class="visualizer-container" id="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <!-- Radio Controls -->
            <div class="radio-controls">
                <button id="play-btn">▶ Play</button>
                <button id="stop-btn" disabled>⏹ Stop</button>
            </div>
        </div>
    </div>
    
    <audio id="audio-source" preload="none" crossorigin="anonymous"></audio>

    <script>
        // ===========================
        // New Constellation Visualizer
        // ===========================
        let audioCtx, analyser, audioSource, freqArray, animationId;
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const audioEl = document.getElementById('audio-source');

        // Initialize the visualizer 
        function initVisualizer() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048; // Frequency resolution
            freqArray = new Uint8Array(analyser.frequencyBinCount);

            audioSource = audioCtx.createMediaElementSource(audioEl);
            audioSource.connect(analyser);
            analyser.connect(audioCtx.destination);

            console.log('🎵 AudioContext initialized!');
        }

        // Draw onto the canvas
        function drawVisualizer() {
            if (!canvasCtx) return;

            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvasCtx.scale(dpr, dpr);

            const width = canvas.width;
            const height = canvas.height;

            // Clear canvas
            canvasCtx.clearRect(0, 0, width, height);

            analyser.getByteFrequencyData(freqArray);

            const barWidth = width / freqArray.length;
            let x = 0;

            for (let i = 0; i < freqArray.length; i++) {
                const barHeight = freqArray[i] / 2;
                const alpha = barHeight / 256; // Transparency per frequency
                canvasCtx.fillStyle = `rgba(124, 58, 237, ${alpha})`;
                canvasCtx.fillRect(x, height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }

            // Continue animation
            animationId = requestAnimationFrame(drawVisualizer);
        }

        // Start the visualizer
        function startVisualizer() {
            audioCtx.resume().then(() => {
                drawVisualizer();
                audioEl.play();
                console.log('✅ Visualizer started');
            });
        }

        // Stop visualizer
        function stopVisualizer() {
            cancelAnimationFrame(animationId);
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            audioEl.pause();
            console.log('⏹ Visualizer stopped');
        }

        // ===========================
        // Radio Player functionality
        // ===========================
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');

        // Radio Player Events
        playBtn.addEventListener('click', () => {
            if (!audioCtx) initVisualizer(); // Lazy initialization
            audioEl.src = "https://majesticradio.duckdns.org/listen/liquid_drum/liquiddrum.mp3"; // Add radio stream URL
            startVisualizer();

            // Toggle Buttons
            playBtn.disabled = true;
            stopBtn.disabled = false;
        });

        stopBtn.addEventListener('click', () => {
            stopVisualizer();

            // Toggle Buttons
            stopBtn.disabled = true;
            playBtn.disabled = false;
        });
    </script>
</body>
</html>
