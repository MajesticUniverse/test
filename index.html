<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Liquid Drum · Настоящий Визуализатор</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #050a14 0%, #0a121f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 2rem;
        }
        .radio-visualizer {
            max-width: 800px;
            width: 100%;
            background: rgba(12, 25, 45, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            padding: 1.8rem 2rem 2rem;
            border: 1px solid rgba(72, 187, 255, 0.3);
        }
        .now-playing-card {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 2rem;
            padding: 1rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .song-title { font-size: 1.5rem; color: white; margin: 0; word-break: break-word; }
        .song-artist { font-size: 1rem; color: #aaa; margin-top: 5px; }
        canvas {
            display: block;
            width: 100%;
            height: 160px;
            background: #01040b;
            border-radius: 1rem;
            margin: 20px 0;
        }
        button {
            background: #2c5a9e;
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 2rem;
            margin: 5px;
        }
        .status-badge { text-align: center; color: #bbd9ff; font-size: 0.8rem; margin-top: 15px; }
        footer { font-size: 0.7rem; text-align: center; margin-top: 1rem; color: #5e7c9c; }
    </style>
</head>
<body>
<div class="radio-visualizer">
    <div class="now-playing-card">
        <div class="song-title" id="songTitle">—</div>
        <div class="song-artist" id="songArtist">—</div>
        <canvas id="audioCanvas" width="800" height="160"></canvas>
    </div>
    <div style="text-align: center;">
        <button id="playBtn">🎧 Включить эфир</button>
        <button id="stopBtn">⏹ Выключить</button>
    </div>
    <div class="status-badge" id="audioStatus">⚡ Остановлен</div>
    <footer>🎛 Liquid Drum · Реальная анализ звука через Audio Fetch</footer>
</div>

<script>
    const CONFIG = {
        streamUrl: 'https://majesticradio.duckdns.org/listen/liquid_drum/liquiddrum.mp3'
    };

    let audioContext = null;
    let currentSource = null;
    let isPlaying = false;
    let animationId = null;
    let currentFetchedBuffer = null; // Храним декодированный буфер

    // DOM Элементы
    const canvas = document.getElementById('audioCanvas');
    const canvasCtx = canvas.getContext('2d');
    const songTitleEl = document.getElementById('songTitle');
    const songArtistEl = document.getElementById('songArtist');
    const audioStatusSpan = document.getElementById('audioStatus');

    // Получение метаданных (можно оставить прошлую версию)
    async function fetchNowPlaying() {
        try {
            const res = await fetch('https://majesticradio.duckdns.org/api/nowplaying/1');
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data.now_playing?.song) {
                songTitleEl.innerText = data.now_playing.song.title || '—';
                songArtistEl.innerText = data.now_playing.song.artist || '—';
            } else {
                songTitleEl.innerText = 'Ожидание трека';
                songArtistEl.innerText = '';
            }
        } catch(e) {
            console.warn('API error', e);
            songTitleEl.innerText = '⚠️ Ошибка получения данных';
        }
    }
    setInterval(fetchNowPlaying, 10000);
    fetchNowPlaying();


    // === 1. Функция загрузки и декодирования ===
    // Загружаем первые 2MB для быстрого старта
    async function fetchAndDecodeAudio() {
        audioStatusSpan.innerText = '📡 Загрузка потока...';
        try {
            // Запрашиваем первые 2 мегабайта файла
            const response = await fetch(CONFIG.streamUrl, {
                headers: { 'Range': 'bytes=0-2000000' }
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const arrayBuffer = await response.arrayBuffer();
            audioStatusSpan.innerText = '🎛 Декодирование аудио...';
            
            // Создаем контекст, если его нет
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Декодируем MP3 в PCM данные
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            return audioBuffer;
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            audioStatusSpan.innerText = '❌ Ошибка загрузки/декодирования';
            throw error;
        }
    }

    // === 2. Функция запуска визуализации ===
    function startVisualizerFromBuffer(audioBuffer) {
        if (!audioContext) return;
        
        // Останавливаем старые ноды
        if (currentSource) {
            try { currentSource.stop(); currentSource.disconnect(); } catch(e) {}
        }
        if (animationId) cancelAnimationFrame(animationId);

        // Создаем источник для нового буфера
        currentSource = audioContext.createBufferSource();
        currentSource.buffer = audioBuffer;
        currentSource.loop = true; // Зацикливаем для непрерывности
        currentSource.loopStart = 0;
        // Устанавливаем длительность цикла (можно динамически, но пока как есть)
        currentSource.loopEnd = audioBuffer.duration; 
        
        // Создаем анализатор
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        
        // Подключаем: Источник -> Анализатор -> Колонки
        currentSource.connect(analyser);
        analyser.connect(audioContext.destination);
        
        // Запускаем воспроизведение
        if (audioContext.state === 'suspended') {
            audioContext.resume().then(() => {
                currentSource.start(0);
                isPlaying = true;
                audioStatusSpan.innerText = '🎵 Эфир играет + LIVE спектр!';
            }).catch(e => console.error(e));
        } else {
            currentSource.start(0);
            isPlaying = true;
            audioStatusSpan.innerText = '🎵 Эфир играет + LIVE спектр!';
        }

        // Canvas анимация
        function drawVisualizer() {
            if (!isPlaying || !analyser) {
                if (animationId) cancelAnimationFrame(animationId);
                return;
            }
            animationId = requestAnimationFrame(drawVisualizer);
            analyser.getByteFrequencyData(dataArray);
            
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / bufferLength) * 1.5;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const percent = dataArray[i] / 255;
                const barHeight = (percent * canvas.height) * 0.85;
                const hue = 200 + percent * 120;
                canvasCtx.fillStyle = `hsl(${hue}, 85%, 60%)`;
                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                x += barWidth;
            }
        }
        drawVisualizer();
    }

    // === 3. Основной цикл обновления ===
    let isUpdating = false;
    async function updateStreamQueue() {
        if (isUpdating) return;
        isUpdating = true;
        try {
            // 1. Загружаем и декодируем новые данные
            const newBuffer = await fetchAndDecodeAudio();
            // 2. Если есть текущий буфер, сохраняем его для плавного перехода
            if (currentFetchedBuffer) {
                // Можно сделать кроссфейд, но для простоты просто отпускаем
            }
            currentFetchedBuffer = newBuffer;
            // 3. Если сейчас ничего не играет (или первая загрузка), запускаем визуализатор
            if (!isPlaying || !currentSource) {
                startVisualizerFromBuffer(currentFetchedBuffer);
            } else {
                // Если уже играет, можно обновить буфер в источнике (требует пересоздания источника)
                // Для стабильности лучше перезапустить визуализатор с новым буфером
                console.log('Обновление буфера...');
                startVisualizerFromBuffer(currentFetchedBuffer);
            }
        } catch (err) {
            console.error('Update failed', err);
        } finally {
            isUpdating = false;
        }
    }

    // === 4. Кнопки Старт/Стоп ===
    async function startPlayback() {
        if (isPlaying) return;
        await updateStreamQueue();
        // Запускаем обновление каждые 30 секунд
        if (window.updateInterval) clearInterval(window.updateInterval);
        window.updateInterval = setInterval(updateStreamQueue, 30000);
    }

    function stopPlayback() {
        isPlaying = false;
        if (currentSource) {
            try { currentSource.stop(); currentSource.disconnect(); } catch(e) {}
            currentSource = null;
        }
        if (window.updateInterval) clearInterval(window.updateInterval);
        if (animationId) cancelAnimationFrame(animationId);
        audioStatusSpan.innerText = '⏹ Остановлен';
        canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
        canvasCtx.fillStyle = '#01040b';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.fillStyle = '#3c6b92';
        canvasCtx.font = '14px monospace';
        canvasCtx.fillText('Спектр остановлен', canvas.width/2-90, canvas.height/2);
    }

    document.getElementById('playBtn').onclick = startPlayback;
    document.getElementById('stopBtn').onclick = stopPlayback;
    
    window.addEventListener('beforeunload', () => {
        if (audioContext) audioContext.close();
    });
</script>
</body>
</html>
