<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic Radio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Majestic Radio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2d1f4e">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/index.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    <style>
        :root {
            --bg-primary: #2d1f4e; --bg-secondary: #3d2a6e; --bg-tertiary: #4a3580;
            --text-primary: #ffffff; --text-secondary: #d4c4e8; --text-muted: #9d8bbd;
            --accent: #7c3aed; --accent-light: #a78bfa; --success: #10b981; --error: #ef4444;
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.4); --border-radius: 16px; --border-radius-lg: 24px;
            --btn-glass: rgba(255, 255, 255, 0.08); --btn-glass-hover: rgba(255, 255, 255, 0.15); --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1030 0%, #2d1f4e 50%, #3d2a6e 100%);
            color: var(--text-primary); min-height: 100vh; min-height: -webkit-fill-available;
            overflow-x: hidden; display: flex; justify-content: center; align-items: flex-start;
        }
        .app-container { width: 100%; max-width: 420px; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .player-card {
            width: 100%; background: rgba(45, 31, 78, 0.6); backdrop-filter: blur(20px);
            border-radius: var(--border-radius-lg); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px; box-shadow: var(--shadow-lg); position: relative; overflow: hidden;
        }
        .app-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; margin-bottom: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .radio-title { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: 1px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .burger-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--btn-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--btn-shadow); position: relative; z-index: 60;
        }
        .burger-btn:hover { background: var(--btn-glass-hover); transform: translateY(-1px); border-color: rgba(255, 255, 255, 0.3); }
        .burger-btn .burger-line { width: 18px; height: 2px; background: var(--text-primary); border-radius: 1px; position: absolute; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .burger-btn .burger-line:first-child { transform: translateY(-5px); }
        .burger-btn .burger-line:nth-child(3) { transform: translateY(5px); }
        .burger-btn.active .burger-line:first-child { transform: rotate(45deg); }
        .burger-btn.active .burger-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .burger-btn.active .burger-line:nth-child(3) { transform: rotate(-45deg); }
        .cover-wrapper {
            position: relative; width: 100%; margin-bottom: 24px; border-radius: var(--border-radius);
            overflow: hidden; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5); aspect-ratio: 1;
        }
        .cover-art {
            width: 100%; height: 100%; background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            display: flex; align-items: center; justify-content: center; font-size: 80px;
            background-size: cover; background-position: center; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cover-art.playing { animation: pulse-slow 6s ease-in-out infinite; }
        .cover-placeholder { opacity: 0.6; color: white; }
        @keyframes pulse-slow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .viz-container {
            position: absolute; bottom: 0; left: 0; right: 0; width: 100%; height: 50%;
            pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
            background: linear-gradient(to top, rgba(10, 5, 20, 0.7) 0%, rgba(10, 5, 20, 0.3) 40%, transparent 100%);
            border-bottom-left-radius: var(--border-radius); border-bottom-right-radius: var(--border-radius);
            overflow: hidden;
        }
        .viz-container.active { opacity: 1; }
        #viz-canvas { width: 100%; height: 100%; display: block; }
        .track-info { text-align: center; margin-bottom: 20px; min-height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .track-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); line-height: 1.3; min-height: 32px; transition: opacity 0.2s ease; }
        .track-title.placeholder { opacity: 0.5; }
        .track-artist { font-size: 17px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 400; min-height: 24px; transition: opacity 0.2s ease; }
        .track-artist.placeholder { opacity: 0.5; }
        .progress-container { width: 100%; margin-bottom: 24px; min-height: 36px; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; }
        .progress-container.active { opacity: 1; visibility: visible; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 2px; overflow: hidden; position: relative; cursor: default; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 2px; transition: width 0.3s ease; }
        .progress-time { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 32px; }
        .control-btn {
            width: 52px; height: 52px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--btn-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--btn-shadow);
        }
        .control-btn svg { width: 20px; height: 20px; fill: currentColor; transition: transform 0.2s; }
        .control-btn:hover { background: var(--btn-glass-hover); transform: translateY(-2px); }
        .control-btn:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.2); }
        .play-btn {
            width: 76px; height: 76px; background: linear-gradient(135deg, rgba(124, 58, 237, 0.8), rgba(167, 139, 250, 0.8));
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); color: white;
            border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-btn svg { width: 28px; height: 28px; fill: white; }
        .play-btn:hover { background: linear-gradient(135deg, rgba(124, 58, 237, 0.95), rgba(167, 139, 250, 0.95)); transform: translateY(-3px) scale(1.05); }
        .play-btn:active { transform: scale(0.95); }
        .stations-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
            border-radius: var(--border-radius-lg); z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 32px 24px; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
            transform: scale(0.95);
        }
        .stations-overlay.open { opacity: 1; visibility: visible; transform: scale(1); }
        .stations-overlay-content { display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 1; pointer-events: auto; }
        .stations-overlay-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); }
        .stations-list { width: 100%; display: flex; flex-direction: column; gap: 8px; max-height: 60vh; overflow-y: auto; padding: 4px; }
        .station-item {
            width: 100%; padding: 14px 18px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary); font-size: 14px; cursor: pointer;
            transition: all 0.2s ease; font-family: inherit; font-weight: 500;
            text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .station-item:hover { background: rgba(255, 255, 255, 0.12); }
        .station-item:active { transform: scale(0.98); }
        .station-item.active { background: rgba(124, 58, 237, 0.3); border-color: var(--accent); }
        .station-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
        .station-item.active .station-dot { background: var(--success); box-shadow: 0 0 8px rgba(16, 185, 129, 0.6); }
        .stations-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px; }
        .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: var(--text-muted); display: flex; align-items: center; gap: 4px; font-weight: 500; }
        .status-badge.online { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-badge.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        .status-badge.loading { background: rgba(167, 139, 250, 0.2); color: var(--accent-light); }
        .error-toast {
            position: absolute; bottom: 16px; left: 16px; right: 16px; padding: 12px 16px;
            background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px; color: var(--error); font-size: 13px; text-align: center;
            opacity: 0; transform: translateY(10px); transition: all 0.3s ease; pointer-events: none; z-index: 40;
        }
        .error-toast.visible { opacity: 1; transform: translateY(0); }
        .diag-btn {
            position: absolute; bottom: 16px; right: 16px; width: 32px; height: 32px;
            border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.15);
            background: var(--btn-glass); color: var(--text-muted); font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; z-index: 10;
        }
        .diag-btn:hover { background: var(--btn-glass-hover); color: var(--text-primary); transform: scale(1.1); }

        .diag-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 2, 15, 0.92); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: var(--border-radius-lg); z-index: 100;
            display: none; flex-direction: column;
            overflow: hidden;
        }
        .diag-overlay.open { display: flex; }
        .diag-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px 14px; flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .diag-header h3 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .diag-close-btn {
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.15);
            background: var(--btn-glass); color: var(--text-primary); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            transition: all 0.2s ease; flex-shrink: 0;
        }
        .diag-close-btn:hover { background: var(--btn-glass-hover); transform: scale(1.05); }
        .diag-close-btn:active { transform: scale(0.95); }
        .diag-body { flex: 1; overflow-y: auto; padding: 16px 20px; -webkit-overflow-scrolling: touch; }
        .diag-section { margin-bottom: 14px; }
        .diag-section-title { font-size: 11px; font-weight: 700; color: var(--accent-light); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .diag-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        .diag-label { color: var(--text-muted); flex-shrink: 0; }
        .diag-value { color: var(--text-secondary); text-align: right; max-width: 60%; word-break: break-all; }
        .diag-value.error { color: var(--error); }
        .diag-value.ok { color: var(--success); }
        .diag-value.warn { color: #f59e0b; }
        .diag-events { max-height: 100px; overflow-y: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; line-height: 1.5; }
        .diag-event { padding: 2px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); display: flex; gap: 6px; }
        .diag-event .ev-time { color: var(--text-muted); flex-shrink: 0; }
        .diag-event .ev-type-ok { color: var(--success); }
        .diag-event .ev-type-err { color: var(--error); }
        .diag-event .ev-type-warn { color: #f59e0b; }
        .diag-event .ev-type-info { color: var(--accent-light); }
        .diag-footer { flex-shrink: 0; padding: 14px 20px; border-top: 1px solid rgba(255, 255, 255, 0.08); }
        .diag-copy-btn {
            width: 100%; padding: 14px 16px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none; color: white; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .diag-copy-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); }
        .diag-copy-btn:active { transform: scale(0.98); }
        .diag-copy-btn.copied { background: linear-gradient(135deg, #059669, var(--success)); }
        .diag-test-btn {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: var(--btn-glass); border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-primary); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; font-family: inherit;
            margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .diag-test-btn:hover { background: var(--btn-glass-hover); }
        .diag-test-btn:active { transform: scale(0.98); }
        .diag-test-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .diag-test-result { font-size: 11px; color: var(--text-muted); margin-top: 6px; padding: 6px 8px; background: rgba(0,0,0,0.2); border-radius: 6px; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
        .diag-test-result.ok { color: var(--success); }
        .diag-test-result.err { color: var(--error); }

        @media (max-height: 700px) { .cover-wrapper { max-width: 100%; } .track-title { font-size: 22px; } .app-container { padding: 16px; } }
        @media (max-width: 400px) { .play-btn { width: 68px; height: 68px; } .controls { gap: 20px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="player-card">
            <header class="app-header">
                <div class="logo"><h1 class="radio-title">MAJESTIC RADIO</h1></div>
                <div class="header-right">
                    <div class="status-badge" id="status-badge"><span>Оффлайн</span></div>
                    <button class="burger-btn" id="burger-btn" title="Станции">
                        <span class="burger-line"></span><span class="burger-line"></span><span class="burger-line"></span>
                    </button>
                </div>
            </header>
            <div class="cover-wrapper">
                <div class="cover-art" id="cover-art"><div class="cover-placeholder">🎵</div></div>
                <div class="viz-container" id="viz-container">
                    <canvas id="viz-canvas"></canvas>
                </div>
            </div>
            <div class="track-info">
                <h2 class="track-title placeholder" id="track-title">—</h2>
                <p class="track-artist placeholder" id="track-artist">—</p>
            </div>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <div class="progress-time"><span id="progress-current">0:00</span><span id="progress-duration">0:00</span></div>
            </div>
            <div class="controls">
                <button class="control-btn" id="prev-btn" title="Предыдущая станция"><svg viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 19V5h2v14H5z"/></svg></button>
                <button class="control-btn play-btn" id="play-btn" title="Play/Pause">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="next-btn" title="Следующая станция"><svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm14 0v16h-2V4h2z"/></svg></button>
            </div>
            <div class="error-toast" id="error-toast"></div>
            <button class="diag-btn" id="diag-btn" title="Диагностика">⚙️</button>

            <div class="diag-overlay" id="diag-overlay">
                <div class="diag-header">
                    <h3>🔧 Диагностика</h3>
                    <button class="diag-close-btn" id="diag-close-btn">✕</button>
                </div>
                <div class="diag-body" id="diag-body"></div>
                <div class="diag-footer">
                    <button class="diag-copy-btn" id="diag-copy-btn">📋 Скопировать отчёт</button>
                </div>
            </div>

            <div class="stations-overlay" id="stations-overlay">
                <div class="stations-overlay-content">
                    <div class="stations-overlay-title">📻 Станции</div>
                    <div class="stations-list" id="stations-list"><div class="stations-empty">Загрузка станций...</div></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" preload="auto" playsinline crossorigin="anonymous"></audio>
    
    <script>
        const _diag = {
            events: [], audioSnapshots: [], lastError: null, maxEvents: 100, startTime: Date.now(),
            playbackTimeline: [], streamTests: [],
            now() { return new Date().toISOString().replace('T', ' ').substring(0, 23); },
            add(type, message, data = {}) {
                const entry = { time: this.now(), type, message, ...data };
                this.events.unshift(entry);
                if (this.events.length > this.maxEvents) this.events.pop();
                if (type === 'error') this.lastError = entry;
            },
            snapshotAudio(audioEl, stationKey, pendingUrl) {
                if (!audioEl) return null;
                // ИСПОЛЬЗУЕМ pendingUrl если src пуст (snapshot вызван до установки src)
                const actualSrc = pendingUrl || audioEl.src || '(none)';
                const snap = {
                    time: this.now(), station: stationKey,
                    src: actualSrc,
                    networkState: audioEl.networkState,
                    networkStateText: ['(none)', 'LOADING (meta)', 'LOADING', 'LOADED', 'ERROR'][audioEl.networkState] || '?',
                    readyState: audioEl.readyState,
                    readyStateText: ['HAVE_NOTHING', 'HAVE_METADATA', 'HAVE_CURRENT_DATA', 'HAVE_FUTURE_DATA', 'HAVE_ENOUGH_DATA'][audioEl.readyState] || '?',
                    paused: audioEl.paused, ended: audioEl.ended, muted: audioEl.muted,
                    volume: audioEl.volume, playbackRate: audioEl.playbackRate,
                    currentTime: audioEl.currentTime.toFixed(2),
                    buffered: audioEl.buffered.length > 0 ? `${audioEl.buffered.start(0).toFixed(1)}-${audioEl.buffered.end(0).toFixed(1)}` : 'empty',
                    seeking: audioEl.seeking,
                    error: audioEl.error ? { code: audioEl.error.code, message: audioEl.error.message, text: ['(none)', 'ABORTED', 'NETWORK', 'DECODE', 'SRC_NOT_SUPPORTED'][audioEl.error.code] || '?' } : null,
                    webkitPreservesPitch: audioEl.webkitPreservesPitch, preload: audioEl.preload, crossorigin: audioEl.crossOrigin
                };
                this.audioSnapshots.unshift(snap);
                if (this.audioSnapshots.length > 10) this.audioSnapshots.pop();
                return snap;
            },
            recordTimeline(step, data = {}) {
                this.playbackTimeline.push({ time: this.now(), step, ...data });
                if (this.playbackTimeline.length > 20) this.playbackTimeline.shift();
            },
            async testStream(url, timeout = 5000) {
                const start = Date.now();
                const result = { url, time: this.now(), startTime: start };
                try {
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), timeout);
                    result.fetchStart = Date.now();
                    const response = await fetch(url, { method: 'GET', signal: controller.signal, cache: 'no-store' });
                    clearTimeout(timer);
                    result.fetchEnd = Date.now();
                    result.status = response.status;
                    result.ok = response.ok;
                    result.contentType = response.headers.get('Content-Type') || 'unknown';
                    result.contentLength = response.headers.get('Content-Length') || 'unknown';
                    result.duration = result.fetchEnd - result.fetchStart;
                    result.iceHeader = response.headers.get('icy-name') || response.headers.get('icy-description') || 'none';
                    _diag.add('ok', `Stream test OK: ${result.status} ${result.contentType} (${result.duration}ms)`);
                } catch (e) {
                    result.fetchEnd = Date.now();
                    result.duration = result.fetchEnd - result.fetchStart;
                    result.error = e.name + ': ' + e.message;
                    result.isAbort = e.name === 'AbortError';
                    result.isNetwork = e.name === 'TypeError';
                    _diag.add('error', `Stream test FAILED: ${result.error}`);
                }
                this.streamTests.push(result);
                return result;
            },
            async testDNS(domain) {
                const start = Date.now();
                const result = { domain, time: this.now() };
                try {
                    // Пробуем загрузить ресурс с этого домена
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), 5000);
                    await fetch(`https://${domain}`, { mode: 'no-cors', signal: controller.signal });
                    clearTimeout(timer);
                    result.resolved = true;
                    result.duration = Date.now() - start;
                } catch (e) {
                    // no-cors всегда возвращает response, но CORS error не бросает
                    result.resolved = e.name !== 'TypeError';
                    result.error = e.name + ': ' + e.message;
                    result.duration = Date.now() - start;
                }
                return result;
            },
            getBrowserInfo() {

                _diag.snapshotAudio(audio, currentStationKey, streamUrl);
                try {
                    await audio.play();
                    _diag.recordTimeline('audio.play() RESOLVED', { ms: Date.now() - playAttemptStart });
                    _diag.add('ok', 'Playback started successfully');
                    isPlaying = true; playbackStarted = true; reconnectAttempts = 0;
                    updatePlayButton(); _cViz.start(); updateStatus('online');
                    errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null);
                    stallTimeout && (clearTimeout(stallTimeout), stallTimeout = null);
                    _diag.snapshotAudio(audio, currentStationKey, streamUrl);
                    fetchMetadata(station.api);
                    metadataInterval && clearInterval(metadataInterval);
                    metadataInterval = setInterval(() => fetchMetadata(station.api), 10000);
                } catch (err) {
                    _diag.recordTimeline(`audio.play() REJECTED: ${err.name}`, { ms: Date.now() - playAttemptStart });
                    _diag.add('error', `audio.play() rejected: ${err.name} ${err.message}`);
                    if (err.name === 'NotAllowedError') {
                        showError('Нажмите Play ещё раз (iOS требует жест)');
                    } else {
                        reconnectAttempts++;
                        if (reconnectAttempts <= MAX_RECONNECT) {
                            showError('Повторное подключение...');
                            setTimeout(() => startPlayback(station), 1000);
                        } else { showError('Не удалось подключиться к потоку.'); stopPlayback(); }
                    }
                }
            }, tryPlayDelay);
        }

        function stopPlayback() {
            _diag.add('info', 'stopPlayback', { wasPlaying: isPlaying });
            _diag.recordTimeline('stopPlayback');
            audio.pause();
            audio.removeAttribute('src');
            audio.load();
            currentStreamUrl = null;
            isPlaying = false; playbackStarted = false;
            updatePlayButton(); _cViz.stop(); stopProgressAnimation(); updateStatus('idle');
            metadataInterval && (clearInterval(metadataInterval), metadataInterval = null);
            errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null);
            stallTimeout && (clearTimeout(stallTimeout), stallTimeout = null);
            trackData = { duration: 0, elapsed: 0, lastUpdate: 0 };
        }

        function togglePlay() { if (!currentStationKey || !stations[currentStationKey]) return; isPlaying ? stopPlayback() : startPlayback(stations[currentStationKey]); }
        function updatePlayButton() { playIcon.style.display = isPlaying ? 'none' : 'block'; pauseIcon.style.display = isPlaying ? 'block' : 'none'; coverArt.classList.toggle('playing', isPlaying); }
        async function fetchMetadata(apiUrl) { if (!isPlaying) return; try { const response = await fetch(`${apiUrl}?r=${Math.random()}`, { cache: 'no-store' }); if (!response.ok) return; const data = await response.json(), song = data?.now_playing?.song, { duration, elapsed } = data?.now_playing || {}; if (song) { trackTitleEl.textContent = song.title || 'Unknown Track'; trackArtistEl.textContent = song.artist || 'Unknown Artist'; trackTitleEl.classList.remove('placeholder'); trackArtistEl.classList.remove('placeholder'); if (song.art?.trim()) { let artUrl = song.art; artUrl.startsWith('http') || (artUrl = BASE_URL + artUrl); setCoverArt(artUrl); } } if (duration && elapsed !== undefined) { trackData = { duration, elapsed, lastUpdate: Date.now() }; updateProgress(elapsed, duration); startProgressAnimation(); } } catch (e) {} }

        // === DIAGNOSTICS UI ===
        function renderDiagnostics() {
            const data = _diag.collectAll(audio, _cViz, currentStationKey, currentStreamUrl);
            const b = data.browser;
            let html = '';
            html += `<div class="diag-section"><div class="diag-section-title">Браузер</div>`;
            html += `<div class="diag-row"><span class="diag-label">Платформа</span><span class="diag-value">${b.platform}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">Браузер</span><span class="diag-value">${b.browserName}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">iOS</span><span class="diag-value ${b.isIOS ? 'warn' : 'ok'}">${b.isIOS ? 'Да' + (b.iosVersion ? ` v${b.iosVersion}` : '') : 'Нет'}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">Telegram WebView</span><span class="diag-value ${b.isTelegramWebView ? 'warn' : ''}">${b.isTelegramWebView ? 'Да' : 'Нет'}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">PWA</span><span class="diag-value">${b.isPWA ? 'Да' : 'Нет'}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">Online</span><span class="diag-value ${b.online ? 'ok' : 'error'}">${b.online ? 'Да' : 'Нет'}</span></div>`;
            if (typeof b.connection !== 'string') html += `<div class="diag-row"><span class="diag-label">Сеть</span><span class="diag-value">${b.connection.effectiveType} ${b.connection.downlink}Mbps RTT:${b.connection.rtt}ms</span></div>`;
            html += `</div>`;
            html += `<div class="diag-section"><div class="diag-section-title">Кодеки</div>`;
            for (const [k, v] of Object.entries(data.codecs)) { const cls = (v === 'probably' || v === 'maybe') ? 'ok' : (v === '' ? 'error' : 'warn'); html += `<div class="diag-row"><span class="diag-label">${k}</span><span class="diag-value ${cls}">${v || 'нет'}</span></div>`; }
            html += `</div>`;
            html += `<div class="diag-section"><div class="diag-section-title">Web Audio API</div>`;
            html += `<div class="diag-row"><span class="diag-label">Инициализирован</span><span class="diag-value ${data.webAudio.initialized ? 'ok' : 'error'}">${data.webAudio.initialized ? 'Да' : 'Нет'}</span></div>`;
            if (data.webAudio.initialized) { html += `<div class="diag-row"><span class="diag-label">State</span><span class="diag-value ${data.webAudio.state === 'running' ? 'ok' : 'warn'}">${data.webAudio.state}</span></div>`; html += `<div class="diag-row"><span class="diag-label">Sample Rate</span><span class="diag-value">${data.webAudio.sampleRate}Hz</span></div>`; }
            html += `</div>`;
            html += `<div class="diag-section"><div class="diag-section-title">Состояние</div>`;
            html += `<div class="diag-row"><span class="diag-label">Станция</span><span class="diag-value">${data.currentStation || '—'}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">Audio URL</span><span class="diag-value" style="font-size:10px">${data.audioSrc}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">isPlaying</span><span class="diag-value ${data.isPlaying ? 'ok' : ''}">${data.isPlaying}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">playbackStarted</span><span class="diag-value ${data.playbackStarted ? 'ok' : 'warn'}">${data.playbackStarted}</span></div>`;
            html += `<div class="diag-row"><span class="diag-label">Повторы</span><span class="diag-value">${data.reconnectAttempts}</span></div>`;
            html += `</div>`;

            // Timeline
            if (data.playbackTimeline.length > 0) {
                html += `<div class="diag-section"><div class="diag-section-title">Таймлайн воспроизведения</div>`;
                data.playbackTimeline.forEach(t => {
                    const icon = t.step.includes('REJECTED') ? '❌' : t.step.includes('RESOLVED') ? '✅' : '·';
                    html += `<div class="diag-row"><span class="diag-value" style="max-width:100%;font-size:11px">${icon} [${t.time.substring(11)}] ${t.step}${t.ms ? ` (${t.ms}ms)` : ''}</span></div>`;
                });
                html += `</div>`;
            }

            // Stream tests
            if (data.streamTests.length > 0) {
                html += `<div class="diag-section"><div class="diag-section-title">Тесты потока</div>`;
                data.streamTests.forEach((t, i) => {
                    html += `<div class="diag-row"><span class="diag-label">Test #${i + 1}</span>`;
                    if (t.ok) { html += `<span class="diag-value ok">${t.status} ${t.contentType} (${t.duration}ms)</span>`; }
                    else { html += `<span class="diag-value error">${t.error} (${t.duration}ms)</span>`; }
                    html += `</div>`;
                });
                html += `</div>`;
            }

            // Snapshots
            if (data.snapshots.length > 0) {
                const s = data.snapshots[0];
                html += `<div class="diag-section"><div class="diag-section-title">Audio Element (последний снимок)</div>`;
                html += `<div class="diag-row"><span class="diag-label">URL</span><span class="diag-value" style="font-size:10px">${s.src}</span></div>`;
                html += `<div class="diag-row"><span class="diag-label">networkState</span><span class="diag-value ${s.networkState === 3 ? 'error' : s.networkState === 1 ? 'warn' : 'ok'}">${s.networkState} (${s.networkStateText})</span></div>`;
                html += `<div class="diag-row"><span class="diag-label">readyState</span><span class="diag-value ${s.readyState === 0 ? 'warn' : 'ok'}">${s.readyState} (${s.readyStateText})</span></div>`;
                html += `<div class="diag-row"><span class="diag-label">muted</span><span class="diag-value ${s.muted ? 'error' : 'ok'}">${s.muted}</span></div>`;
                html += `<div class="diag-row"><span class="diag-label">volume</span><span class="diag-value">${s.volume}</span></div>`;
                html += `<div class="diag-row"><span class="diag-label">currentTime</span><span class="diag-value">${s.currentTime}</span></div>`;
                html += `<div class="diag-row"><span class="diag-label">buffered</span><span class="diag-value">${s.buffered}</span></div>`;
                html += `<div class="diag-row"><span class="diag-label">error</span><span class="diag-value ${s.error ? 'error' : 'ok'}">${s.error ? `${s.error.text} (${s.error.code})` : 'none'}</span></div>`;
                html += `</div>`;
            }

            // Events
            html += `<div class="diag-section"><div class="diag-section-title">События</div>`;
            html += `<div class="diag-events">`;
            data.events.slice(0, 30).forEach(e => { const cls = e.type === 'error' ? 'ev-type-err' : e.type === 'warn' ? 'ev-type-warn' : e.type === 'ok' ? 'ev-type-ok' : 'ev-type-info'; const icon = e.type === 'error' ? '❌' : e.type === 'warn' ? '⚠️' : e.type === 'ok' ? '✅' : 'ℹ️'; html += `<div class="diag-event"><span class="ev-time">${e.time.substring(11)}</span><span class="${cls}">${icon} ${e.message}</span></div>`; });
            html += `</div></div>`;

            // Test buttons
            html += `<div class="diag-section"><div class="diag-section-title">Тесты</div>`;
            html += `<button class="diag-test-btn" id="diag-test-stream-btn">🌐 Тест подключения к потоку</button>`;
            html += `<div class="diag-test-result" id="diag-test-stream-result" style="display:none"></div>`;
            html += `<button class="diag-test-btn" id="diag-test-dns-btn">🔍 Тест DNS сервера</button>`;
            html += `<div class="diag-test-result" id="diag-test-dns-result" style="display:none"></div>`;
            html += `</div>`;

            diagBody.innerHTML = html;

            // Bind test buttons
            const testStreamBtn = document.getElementById('diag-test-stream-btn');
            const testDnsBtn = document.getElementById('diag-test-dns-btn');
            if (testStreamBtn) {
                testStreamBtn.addEventListener('click', async () => {
                    testStreamBtn.disabled = true;
                    testStreamBtn.textContent = '⏳ Тестирование...';
                    const resultEl = document.getElementById('diag-test-stream-result');
                    resultEl.style.display = 'block'; resultEl.className = 'diag-test-result';
                    resultEl.textContent = 'Тестирование...';
                    const station = stations[currentStationKey];
                    if (station) {
                        const res = await _diag.testStream(station.stream);
                        if (res.ok) { resultEl.className = 'diag-test-result ok'; resultEl.textContent = `✅ OK: ${res.status} ${res.contentType}\nДлительность: ${res.duration}ms\nICY: ${res.iceHeader}`; }
                        else { resultEl.className = 'diag-test-result err'; resultEl.textContent = `❌ FAILED: ${res.error}\nДлительность: ${res.duration}ms\nAbortError: ${res.isAbort}\nNetworkError: ${res.isNetwork}`; }
                    } else { resultEl.textContent = '❌ Нет выбранной станции'; resultEl.className = 'diag-test-result err'; }
                    testStreamBtn.disabled = false;
                    testStreamBtn.textContent = '🌐 Тест подключения к потоку';
                });
            }
            if (testDnsBtn) {
                testDnsBtn.addEventListener('click', async () => {
                    testDnsBtn.disabled = true;
                    testDnsBtn.textContent = '⏳ Тестирование...';
                    const resultEl = document.getElementById('diag-test-dns-result');
                    resultEl.style.display = 'block'; resultEl.className = 'diag-test-result';
                    resultEl.textContent = 'Тестирование DNS...';
                    const res = await _diag.testDNS('majesticradio.duckdns.org');
                    if (res.resolved) { resultEl.className = 'diag-test-result ok'; resultEl.textContent = `✅ DNS resolved\nДлительность: ${res.duration}ms`; }
                    else { resultEl.className = 'diag-test-result err'; resultEl.textContent = `❌ DNS failed: ${res.error}\nДлительность: ${res.duration}ms`; }
                    testDnsBtn.disabled = false;
                    testDnsBtn.textContent = '🔍 Тест DNS сервера';
                });
            }
        }

        function openDiagnostics() { renderDiagnostics(); diagOverlay.classList.add('open'); }
        function closeDiagnostics() { diagOverlay.classList.remove('open'); }
        async function copyDiagnostics() {
            const text = _diag.toText(audio, _cViz, currentStationKey, currentStreamUrl);
            try { await navigator.clipboard.writeText(text); diagCopyBtn.textContent = '✅ Скопировано!'; diagCopyBtn.classList.add('copied'); _diag.add('info', 'Diagnostics copied to clipboard'); setTimeout(() => { diagCopyBtn.textContent = '📋 Скопировать отчёт'; diagCopyBtn.classList.remove('copied'); }, 2000); } catch (e) { const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); diagCopyBtn.textContent = '✅ Скопировано!'; diagCopyBtn.classList.add('copied'); setTimeout(() => { diagCopyBtn.textContent = '📋 Скопировать отчёт'; diagCopyBtn.classList.remove('copied'); }, 2000); }
        }

        function setupEventListeners() {
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', () => { const keys = Object.keys(stations); if (!keys.length) return; const idx = keys.indexOf(currentStationKey); switchStation(keys[idx <= 0 ? keys.length - 1 : idx - 1]); });
            nextBtn.addEventListener('click', () => { const keys = Object.keys(stations); if (!keys.length) return; const idx = keys.indexOf(currentStationKey); switchStation(keys[idx >= keys.length - 1 ? 0 : idx + 1]); });
            burgerBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleStations(); });
            stationsOverlay.addEventListener('click', (e) => { e.target === stationsOverlay && closeStations(); });
            diagBtn.addEventListener('click', openDiagnostics);
            diagCloseBtn.addEventListener('click', closeDiagnostics);
            diagCopyBtn.addEventListener('click', copyDiagnostics);
            let touchStartX = 0, touchStartY = 0, isSwiping = false;
            stationsOverlay.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; isSwiping = true; }, { passive: true });
            stationsOverlay.addEventListener('touchend', (e) => { if (!isSwiping) return; isSwiping = false; const diffX = e.changedTouches[0].screenX - touchStartX; const diffY = e.changedTouches[0].screenY - touchStartY; diffY > 80 && Math.abs(diffX) < 0.5 * Math.abs(diffY) && closeStations(); }, { passive: true });
            let globalStartX = 0, globalStartY = 0;
            document.addEventListener('touchstart', (e) => { globalStartX = e.changedTouches[0].screenX; globalStartY = e.changedTouches[0].screenY; }, { passive: true });
            document.addEventListener('touchend', (e) => { if (stationsOpen) return; const diffX = globalStartX - e.changedTouches[0].screenX, diffY = e.changedTouches[0].screenY - globalStartY; Math.abs(diffX) > 50 && Math.abs(diffX) > 1.5 * Math.abs(diffY) && (diffX > 0 ? nextBtn.click() : prevBtn.click()); }, { passive: true });
            audio.addEventListener('playing', () => { playbackStarted = true; updateStatus('online'); errorTimeout && (clearTimeout(errorTimeout), errorTimeout = null); stallTimeout && (clearTimeout(stallTimeout), stallTimeout = null); _diag.recordTimeline('audio playing event'); _diag.add('ok', 'audio_event_playing', _diag.snapshotAudio(audio, currentStationKey, currentStreamUrl)); });
            audio.addEventListener('stalled', () => { _diag.recordTimeline('audio stalled event'); _diag.add('warn', 'audio_event_stalled', _diag.snapshotAudio(audio, currentStationKey, currentStreamUrl)); if (isPlaying && !playbackStarted) { stallTimeout && clearTimeout(stallTimeout); stallTimeout = setTimeout(() => { reconnectAttempts++; if (reconnectAttempts <= MAX_RECONNECT) { showError('Буферизация...'); startPlayback(stations[currentStationKey]); } else { showError('Поток недоступен'); stopPlayback(); } }, 5000); } });
            audio.addEventListener('error', (e) => { const err = audio.error; let msg = 'Ошибка воспроизведения'; if (err) { if (err.code === MediaError.MEDIA_ERR_NETWORK) msg = 'Ошибка сети'; else if (err.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED) msg = 'Формат не поддерживается'; else if (err.code === MediaError.MEDIA_ERR_DECODE) msg = 'Ошибка декодирования'; else if (err.code === MediaError.MEDIA_ERR_ABORTED) msg = 'Загрузка прервана'; } _diag.recordTimeline(`audio error: ${msg}`); _diag.add('error', msg, { ..._diag.snapshotAudio(audio, currentStationKey, currentStreamUrl), errorMsg: err?.message }); if (isPlaying) { reconnectAttempts++; if (reconnectAttempts <= MAX_RECONNECT) { showError(`${msg}. Попытка ${reconnectAttempts}/${MAX_RECONNECT}`); setTimeout(() => startPlayback(stations[currentStationKey]), 1500); } else { showError(msg); stopPlayback(); } } });
            audio.addEventListener('waiting', () => { _diag.recordTimeline('audio waiting event'); _diag.add('warn', 'audio_event_waiting', _diag.snapshotAudio(audio, currentStationKey, currentStreamUrl)); updateStatus('loading'); });
            audio.addEventListener('loadstart', () => { _diag.recordTimeline('audio loadstart event'); _diag.add('info', 'audio_event_loadstart', _diag.snapshotAudio(audio, currentStationKey, currentStreamUrl)); });
            audio.addEventListener('abort', () => { _diag.recordTimeline('audio abort event'); _diag.add('error', 'audio_event_abort', _diag.snapshotAudio(audio, currentStationKey, currentStreamUrl)); });
            audio.addEventListener('emptied', () => { _diag.recordTimeline('audio emptied event'); _diag.add('info', 'audio_event_emptied', _diag.snapshotAudio(audio, currentStationKey, currentStreamUrl)); });
            audio.addEventListener('canplay', () => { _diag.recordTimeline('audio canplay event'); _diag.add('ok', 'audio_event_canplay', _diag.snapshotAudio(audio, currentStationKey, currentStreamUrl)); });
            audio.addEventListener('canplaythrough', () => { _diag.recordTimeline('audio canplaythrough event'); _diag.add('ok', 'audio_event_canplaythrough', _diag.snapshotAudio(audio, currentStationKey, currentStreamUrl)); });
        }

        try { initPlaceholders(); setupEventListeners(); initStationsStatic(); loadStationsBackground(); _diag.add('info', 'App initialized', _diag.getBrowserInfo()); _diag.snapshotAudio(audio, null); } catch (e) { _diag.add('error', `Init Error: ${e.message}`, { stack: e.stack }); console.error("Init Error:", e); }

        if (window.Telegram && window.Telegram.WebApp) { try { const tg = window.Telegram.WebApp; tg.ready(); tg.expand && tg.expand(); if (tg.themeParams) { if (tg.themeParams.bg_color) document.documentElement.style.setProperty('--bg-primary', tg.themeParams.bg_color); if (tg.themeParams.text_color) document.documentElement.style.setProperty('--text-primary', tg.themeParams.text_color); } } catch (e) {} }

        window.addEventListener('resize', () => { if (_cViz.ctx) { const c = document.getElementById('viz-canvas'); const dpr = window.devicePixelRatio || 1; const rect = c.getBoundingClientRect(); c.width = rect.width * dpr; c.height = rect.height * dpr; } });
        window.addEventListener('beforeunload', () => { stopPlayback(); _cViz.cleanup(); });
        window.RadioApp = { stations, currentStationKey, switchStation, togglePlay, audio, diagnostics: _diag };
    </script>
</body>
</html>
