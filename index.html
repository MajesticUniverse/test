                            <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Constellation Visualizer — Majestic Radio</title>
  <meta name="theme-color" content="#1a1030">
  <style>
    /* ===== БАЗОВЫЕ СТИЛИ ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1030 0%, #2d1f4e 50%, #3d2a6e 100%);
      color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center;
      padding: 20px;
    }
    
    /* ===== КОНТЕЙНЕР ===== */
    .viz-wrapper {
      width: 100%; max-width: 420px;
      background: rgba(45, 31, 78, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      display: flex; flex-direction: column; align-items: center;
      gap: 20px;
    }
    
    .viz-title {
      font-size: 18px; font-weight: 600; letter-spacing: 0.5px;
      color: #d4c4e8; text-align: center;
    }
    
    .viz-subtitle {
      font-size: 13px; color: #9d8bbd; text-align: center;
    }
    
    /* ===== ОБЛАСТЬ ВИЗУАЛИЗАТОРА ===== */
    .visualizer-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(167,139,250,0.05));
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .visualizer-container {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      background: linear-gradient(to top, rgba(10,5,20,0.8) 0%, transparent 60%);
    }
    
    .visualizer-container.active { opacity: 1; }
    
    #visualizer-canvas {
      width: 100%; height: 100%; display: block;
    }
    
    /* ===== СТАТУС ===== */
    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #9d8bbd;
      padding: 6px 12px; border-radius: 20px;
      background: rgba(255,255,255,0.05);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6b7280; transition: background 0.3s;
    }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.connected { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.6); }
    .status-dot.error { background: #ef4444; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    /* ===== КНОПКИ ===== */
    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.9), rgba(167, 139, 250, 0.9));
      color: white; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }
    
    /* ===== ИНФО ===== */
    .info {
      font-size: 11px; color: #7c6a99; text-align: center; line-height: 1.4;
      max-width: 340px;
    }
    .info a { color: #a78bfa; text-decoration: none; }
    .info a:hover { text-decoration: underline; }
    
    /* ===== АДАПТИВ ===== */
    @media (max-width: 480px) {
      .viz-wrapper { padding: 20px; }
      .viz-title { font-size: 16px; }
      .btn { padding: 12px 24px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="viz-wrapper">
    <h1 class="viz-title">✨ Constellation Visualizer</h1>
    <p class="viz-subtitle">Majestic Radio • Liquid Drum</p>
    
    <div class="visualizer-box">
      <div class="visualizer-container" id="visualizer-container">
        <canvas id="visualizer-canvas"></canvas>
      </div>
    </div>
    
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Ожидание...</span>
    </div>
    
    <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
      <button class="btn" id="connectBtn">🔗 Подключиться</button>
      <button class="btn btn-secondary" id="stopBtn" disabled>⏹ Отключить</button>
    </div>
    
    <p class="info">
      Поток: <code>liquid_drum.mp3</code><br>
      Сервер: <a href="https://majesticradio.duckdns.org" target="_blank">majesticradio.duckdns.org</a><br>
      💡 Нажмите «Подключиться» для запуска аудио и визуализации
    </p>
  </div>

  <!-- Аудио-элемент для потока -->
  <audio id="audio-source" preload="none" crossorigin="anonymous" playsinline></audio>

  <script>
    // ========================================
    // 🎨 CONSTELLATION VISUALIZER — CORE CODE
    // ========================================
    
    // === КОНФИГУРАЦИЯ ПОТОКА ===
    const STREAM_CONFIG = {
      url: 'https://majesticradio.duckdns.org/listen/liquid_drum/liquiddrum.mp3',
      name: 'Liquid Drum',
      reconnectDelay: 3000, // 3 секунды перед переподключением
      maxReconnectAttempts: 5
    };
    
    // === ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===
    let audioCtx = null, analyser = null, sourceNode = null;
    let freqData = null;
    let vizAnimId = null;
    let isVizRunning = false;
    let isConnected = false;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    
    // === НАСТРОЙКИ ВИЗУАЛИЗАТОРА ===
    const CONFIG = {
      NUM_NODES: 48,
      CONN_DISTANCE: 45,
      FFT_SIZE: 2048,
      SMOOTHING: 0.75,
      MAX_FREQ: 10000,
      NODE_HEIGHT: 0.75,
      BASE_Y: 0.85
    };
    
    const nodes = [];
    for (let i = 0; i < CONFIG.NUM_NODES; i++) {
      nodes.push({ x: 0, y: 0, energy: 0, targetY: 0 });
    }
    
    // === DOM-ЭЛЕМЕНТЫ ===
    const canvas = document.getElementById('visualizer-canvas');
    const canvasCtx = canvas.getContext('2d');
    const visualizerContainer = document.getElementById('visualizer-container');
    const audioEl = document.getElementById('audio-source');
    const connectBtn = document.getElementById('connectBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    
    // ========================================
    // 📡 ФУНКЦИИ СТАТУСА
    // ========================================
    
    function updateStatus(state, message) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = message;
      console.log(`[Status] ${state}: ${message}`);
    }
    
    // ========================================
    // 🔧 ФУНКЦИИ ВИЗУАЛИЗАТОРА
    // ========================================
    
    function initAudioAnalysis() {
      if (audioCtx) return true;
      
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = CONFIG.FFT_SIZE;
        analyser.smoothingTimeConstant = CONFIG.SMOOTHING;
        
        freqData = new Uint8Array(analyser.frequencyBinCount);
        
        sourceNode = audioCtx.createMediaElementSource(audioEl);
        sourceNode.connect(analyser);
        analyser.connect(audioCtx.destination);
        
        console.log('✅ AudioContext initialized');
        return true;
      } catch (e) {
        console.error('❌ Web Audio error:', e.message);
        updateStatus('error', 'Ошибка аудио');
        return false;
      }
    }
    
    function drawConstellation() {
      if (!canvasCtx) return;
      
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvasCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      
      const w = rect.width;
      const h = rect.height;
      canvasCtx.clearRect(0, 0, w, h);
      
      if (!analyser || !freqData) {
        vizAnimId = requestAnimationFrame(drawConstellation);
        return;
      }
      
      analyser.getByteFrequencyData(freqData);
      const binWidth = audioCtx.sampleRate / analyser.fftSize;
      const maxFreqBin = Math.min(freqData.length - 1, Math.floor(CONFIG.MAX_FREQ / binWidth));
      
      for (let i = 0; i < CONFIG.NUM_NODES; i++) {
        const ratio = i / (CONFIG.NUM_NODES - 1);
        const bin = Math.max(0, Math.floor(ratio * maxFreqBin));
        const val = freqData[bin] / 255;
        
        nodes[i].x = (i / (CONFIG.NUM_NODES - 1)) * w;
        nodes[i].targetY = h * CONFIG.BASE_Y - (val * h * CONFIG.NODE_HEIGHT);
        nodes[i].y += (nodes[i].targetY - nodes[i].y) * 0.15;
        nodes[i].energy = val;
      }
      
      // Линии
      canvasCtx.lineWidth = 0.8;
      for (let i = 0; i < CONFIG.NUM_NODES; i++) {
        for (let j = i + 1; j < CONFIG.NUM_NODES; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const distSq = dx * dx + dy * dy;
          
          if (distSq < CONFIG.CONN_DISTANCE * CONFIG.CONN_DISTANCE) {
            const dist = Math.sqrt(distSq);
            const alpha = (1 - dist / CONFIG.CONN_DISTANCE) * 0.35 * (0.4 + nodes[i].energy + nodes[j].energy);
            canvasCtx.strokeStyle = `rgba(180, 160, 255, ${Math.max(0, Math.min(1, alpha))})`;
            canvasCtx.beginPath();
            canvasCtx.moveTo(nodes[i].x, nodes[i].y);
            canvasCtx.lineTo(nodes[j].x, nodes[j].y);
            canvasCtx.stroke();
          }
        }
      }
      
      // Точки
      for (let i = 0; i < CONFIG.NUM_NODES; i++) {
        const n = nodes[i];
        const r = 1.2 + n.energy * 3.5;
        const alpha = 0.4 + n.energy * 0.6;
        
        canvasCtx.shadowColor = `rgba(167, 139, 250, ${alpha * 0.6})`;
        canvasCtx.shadowBlur = 6;
        canvasCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        
        canvasCtx.beginPath();
        canvasCtx.arc(n.x, n.y, r, 0, Math.PI * 2);
        canvasCtx.fill();
        
        canvasCtx.shadowBlur = 0;
      }
      
      vizAnimId = requestAnimationFrame(drawConstellation);
    }
    
    function startVisualizer() {
      visualizerContainer.classList.add('active');
      
      if (!initAudioAnalysis()) return;
      if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
      
      if (!isVizRunning) {
        isVizRunning = true;
        cancelAnimationFrame(vizAnimId);
        drawConstellation();
        console.log('▶ Visualizer started');
      }
    }
    
    function stopVisualizer() {
      visualizerContainer.classList.remove('active');
      isVizRunning = false;
      cancelAnimationFrame(vizAnimId);
      
      if (canvasCtx) {
        const rect = canvas.getBoundingClientRect();
        canvasCtx.clearRect(0, 0, rect.width, rect.height);
      }
      console.log('⏹ Visualizer stopped');
    }
    
    // ========================================
    // 📡 ФУНКЦИИ ПОДКЛЮЧЕНИЯ К ПОТОКУ
    // ========================================
    
    function setupAudioEvents() {
      audioEl.addEventListener('playing', () => {
        updateStatus('connected', `🎵 ${STREAM_CONFIG.name}`);
        startVisualizer();
        reconnectAttempts = 0; // Сброс при успешном воспроизведении
      });
      
      audioEl.addEventListener('pause', () => {
        if (!isConnected) return;
        // Не останавливаем визуализатор сразу — поток может буферизироваться
      });
      
      audioEl.addEventListener('error', (e) => {
        console.error('❌ Stream error:', audioEl.error);
        updateStatus('error', 'Ошибка потока');
        stopVisualizer();
        attemptReconnect();
      });
      
      audioEl.addEventListener('stalled', () => {
        console.warn('⚠️ Stream stalled');
        updateStatus('connecting', 'Буферизация...');
      });
      
      audioEl.addEventListener('waiting', () => {
        updateStatus('connecting', 'Загрузка...');
      });
    }
    
    async function connectToStream() {
      if (isConnected) return;
      
      updateStatus('connecting', 'Подключение...');
      connectBtn.disabled = true;
      
      try {
        // Добавляем timestamp чтобы избежать кэширования
        const streamUrl = `${STREAM_CONFIG.url}?t=${Date.now()}`;
        
        audioEl.src = streamUrl;
        audioEl.load();
        
        // Инициализация AudioContext требует жеста пользователя
        if (!initAudioAnalysis()) {
          throw new Error('Failed to init AudioContext');
        }
        
        // Resume если контекст был приостановлен
        if (audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }
        
        // Запуск воспроизведения
        await audioEl.play();
        
        isConnected = true;
        connectBtn.disabled = true;
        stopBtn.disabled = false;
        connectBtn.textContent = '🔗 Подключено';
        
        console.log(`✅ Connected to ${STREAM_CONFIG.url}`);
        
      } catch (err) {
        console.error('❌ Connection failed:', err.message);
        updateStatus('error', 'Не удалось подключиться');
        connectBtn.disabled = false;
        cleanupAudio();
      }
    }
    
    function disconnectFromStream() {
      if (!isConnected) return;
      
      audioEl.pause();
      audioEl.src = '';
      isConnected = false;
      
      stopVisualizer();
      cleanupAudio();
      
      connectBtn.disabled = false;
      stopBtn.disabled = true;
      connectBtn.textContent = '🔗 Подключиться';
      
      updateStatus('', 'Отключено');
      console.log('🔌 Disconnected');
    }
    
    function attemptReconnect() {
      if (!isConnected || reconnectAttempts >= STREAM_CONFIG.maxReconnectAttempts) {
        updateStatus('error', 'Переподключение не удалось');
        disconnectFromStream();
        return;
      }
      
      reconnectAttempts++;
      const delay = STREAM_CONFIG.reconnectDelay * reconnectAttempts;
      
      console.log(`🔄 Reconnect attempt ${reconnectAttempts}/${STREAM_CONFIG.maxReconnectAttempts} in ${delay}ms`);
      updateStatus('connecting', `Переподключение... (${reconnectAttempts})`);
      
      reconnectTimer = setTimeout(() => {
        if (isConnected) {
          connectToStream();
        }
      }, delay);
    }
    
    function cleanupAudio() {
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      
      if (sourceNode) {
        try { sourceNode.disconnect(); } catch(e) {}
        sourceNode = null;
      }
      if (analyser) {
        try { analyser.disconnect(); } catch(e) {}
        analyser = null;
      }
      if (audioCtx && audioCtx.state !== 'closed') {
        audioCtx.close().catch(() => {});
        audioCtx = null;
      }
    }
    
    function cleanup() {
      disconnectFromStream();
      cleanupAudio();
      console.log('🧹 Cleanup done');
    }
    
    // ========================================
    // 🎮 ОБРАБОТЧИКИ СОБЫТИЙ
    // ========================================
    
    connectBtn.addEventListener('click', async () => {
      await connectToStream();
    });
    
    stopBtn.addEventListener('click', () => {
      disconnectFromStream();
    });
    
    // Ресайз канваса
    function resizeCanvas() {
      if (!canvasCtx) return;
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // Очистка при закрытии
    window.addEventListener('beforeunload', cleanup);
    
    // Инициализация
    setupAudioEvents();
    updateStatus('', 'Готов к подключению');
    
    // ========================================
    // 📦 ЭКСПОРТ ДЛЯ ВНЕШНЕГО ИСПОЛЬЗОВАНИЯ
    // ========================================
    
    window.Visualizer = {
      connect: async function(url) {
        if (isConnected) disconnectFromStream();
        STREAM_CONFIG.url = url;
        await connectToStream();
      },
      disconnect: disconnectFromStream,
      start: startVisualizer,
      stop: stopVisualizer,
      isConnected: () => isConnected,
      getConfig: () => ({ ...CONFIG }),
      setConfig: (newConfig) => Object.assign(CONFIG, newConfig)
    };
    
    console.log('✨ Constellation Visualizer loaded. Stream:', STREAM_CONFIG.url);
  </script>
</body>
</html>
