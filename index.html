<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic Radio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2d1f4e">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    
    <style>
        :root {
            --bg: #1a1030; --card: rgba(45, 31, 78, 0.6);
            --text: #ffffff; --muted: #9d8bbd; --accent: #7c3aed;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1030 0%, #2d1f4e 100%);
            color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .player {
            width: 100%; max-width: 400px; background: var(--card);
            backdrop-filter: blur(20px); border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; position: relative; overflow: hidden;
        }
        .cover-wrapper { position: relative; width: 100%; aspect-ratio: 1; border-radius: 16px; overflow: hidden; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .cover-art { width: 100%; height: 100%; background: linear-gradient(135deg, #7c3aed, #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 60px; }
        
        /* Визуализатор поверх обложки */
        #viz-canvas {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }
        #viz-canvas.active { opacity: 1; }

        .title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .artist { font-size: 16px; color: var(--muted); margin-bottom: 24px; }
        
        .controls { display: flex; justify-content: center; gap: 20px; align-items: center; }
        .btn {
            width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }
        .play-btn {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: white; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }
        .play-btn:active { transform: scale(0.95); }
        
        select {
            width: 100%; padding: 12px; margin-bottom: 20px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: white; font-size: 16px; outline: none;
        }
        select option { background: #2d1f4e; color: white; }
        
        .status { margin-top: 15px; font-size: 12px; color: var(--muted); }
    </style>
</head>
<body>

<div class="player">
    <div class="cover-wrapper">
        <div class="cover-art">🎵</div>
        <canvas id="viz-canvas"></canvas>
    </div>

    <select id="station-select">
        <option value="https://majesticradio.duckdns.org/listen/liquid_drum/liquiddrum.mp3">Liquid Drum</option>
        <option value="https://majesticradio.duckdns.org/listen/drum__bass/drumnbass.mp3">Drum & Bass</option>
        <option value="https://majesticradio.duckdns.org/listen/psy_chill/psychill.mp3">Psy Chill</option>
        <option value="https://majesticradio.duckdns.org/listen/dark_room/darkroot.mp3">Dark Room</option>
    </select>

    <div class="title" id="track-title">Majestic Radio</div>
    <div class="artist" id="track-artist">Select a station</div>

    <div class="controls">
        <button class="btn play-btn" id="play-btn">
            <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
    </div>
    <div class="status" id="status">Ready</div>
</div>

<!-- crossorigin="anonymous" обязателен! -->
<audio id="audio" playsinline crossorigin="anonymous" preload="none"></audio>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const stationSelect = document.getElementById('station-select');
    const status = document.getElementById('status');
    const canvas = document.getElementById('viz-canvas');
    const ctx = canvas.getContext('2d');

    let audioCtx, analyser, source, dataArray;
    let isPlaying = false;
    let animationId;

    // Инициализация Canvas
    function resizeCanvas() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Настройка Web Audio API
    function initAudioContext() {
        if (audioCtx) return true;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256; // Меньше для производительности
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            return true;
        } catch (e) {
            console.error(e);
            status.textContent = "Audio API Error";
            return false;
        }
    }

    // Рисование визуализатора
    function draw() {
        if (!isPlaying) return;
        animationId = requestAnimationFrame(draw);
        
        analyser.getByteFrequencyData(dataArray);
        
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);

        // Рисуем "Созвездие" (точки и линии)
        const barWidth = (width / dataArray.length) * 2.5;
        let x = 0;
        
        for (let i = 0; i < dataArray.length; i++) {
            const barHeight = (dataArray[i] / 255) * height * 0.8;
            
            ctx.fillStyle = `rgba(167, 139, 250, ${dataArray[i] / 255 + 0.2})`;
            // Рисуем точки, реагирующие на частоты
            ctx.beginPath();
            ctx.arc(x + barWidth/2, height - barHeight/2 - 20, 3 + (dataArray[i]/50), 0, 2 * Math.PI);
            ctx.fill();

            // Линии между активными точками
            if (i < dataArray.length - 1 && dataArray[i] > 50 && dataArray[i+1] > 50) {
                ctx.strokeStyle = `rgba(255, 255, 255, 0.2)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + barWidth/2, height - barHeight/2 - 20);
                ctx.lineTo(x + barWidth + barWidth/2, height - (dataArray[i+1] / 255) * height * 0.8 / 2 - 20);
                ctx.stroke();
            }
            
            x += barWidth;
        }
    }

    // Кнопка Play/Pause
    playBtn.addEventListener('click', async () => {
        // 1. Сначала будим AudioContext (требование iOS)
        if (!initAudioContext()) return;
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            canvas.classList.remove('active');
            cancelAnimationFrame(animationId);
            status.textContent = "Paused";
        } else {
            try {
                status.textContent = "Loading...";
                // Устанавливаем src только если меняется станция или пусто
                if (audio.src !== stationSelect.value) {
                    audio.src = stationSelect.value;
                }
                
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    await playPromise;
                    isPlaying = true;
                    playIcon.style.display = 'none';
                    pauseIcon.style.display = 'block';
                    canvas.classList.add('active');
                    status.textContent = "Playing";
                    draw(); // Запуск анимации
                }
            } catch (err) {
                console.error(err);
                status.textContent = "Error: " + err.message;
            }
        }
    });

    // Смена станции
    stationSelect.addEventListener('change', () => {
        const wasPlaying = isPlaying;
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
        }
        audio.src = stationSelect.value;
        if (wasPlaying) playBtn.click();
    });

    // Telegram WebApp
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>
</body>
</html>
